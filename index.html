<body>
    <div id="root"></div>

    <script type="text/plain" id="app-script">
        const { useState, useEffect, useMemo, useCallback } = React;
        const {
            BarChart, Bar, LineChart, Line, PieChart, Pie, Cell,
            XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
            ComposedChart, Area
        } = Recharts;

        const COLORS = ['#00BCD4', '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A',
                        '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B88B'];

        // ========== DATA LOADING LAYER v2 (rewritten 2026-03-30) ==========
        // Design principles:
        // 1. 明細總表 ONLY — never use cross-tab (unreliable sheet names for 11月/12月)
        // 2. Month from FILENAME — 11月/12月 data has wrong dates (copied template)
        // 3. All names normalized to real names via NICKNAME_TO_REAL
        // 4. Flexible header detection via keyword search, not fixed indices
        // 5. Individual files supplement only months NOT covered by all-staff files

        // Verified nickname → real name mapping (from cross-matching Feb hours)
        const NICKNAME_TO_REAL = {
            'Kate': '余凱紓', 'Janet': '李宜臻', 'PAN': '潘美怡',
            '茹津': '許茹津', '敏佳': '陳敏佳', '阿溫': '劉蕙慈',
            'Stacy': '陳姿羽', 'Kerry': '侯渝琪', '小麥': '吳佳香',
            '妮佛': '陳敬文', '小智': '林宜萱'
        };

        // Department mapping — ONLY real names (authoritative source: 明細總表)
        const EMPLOYEE_DEPT_MAP = {
            '余凱紓': '後勤部', '李宜臻': '企劃部', '潘美怡': '後勤部',
            '許茹津': '商品開發部', '劉蕙慈': '企劃部', '陳姿羽': '管理部',
            '侯渝琪': '商品商發部', '吳佳香': '銷售部', '陳敏佳': '企劃部',
            '林宜萱': '後勤部', '陳敬文': '後勤部'
        };

        // Normalize any name (nickname or real) to canonical real name
        const normalizeEmployeeName = (name) => {
            const n = (name || '').trim();
            if (!n) return n;
            return NICKNAME_TO_REAL[n] || n;
        };

        // Known IP names (from 選單來源 sheet) — used to classify cross-tab items
        const KNOWN_IP_LIST = [
            '老高與小茉', '老高', '力Qii', 'ㄇㄚˊ幾', '咖波', '好想兔',
            'WirForce', 'WirForce', '傳說對決', '小學課本台灣主題', '魔物獵人',
            'Ru味春捲', '逆轉裁判', '排球少年', '銀魂', '咒術迴戰', '鏈鋸人',
            'hololive', '帕比順順', '麵包小偷', '葬送的芙莉蓮', 'ROSIE', '其他IP'
        ];
        const isKnownIP = (name) => {
            const n = name.trim();
            return KNOWN_IP_LIST.some(ip => n === ip || n.includes(ip) || ip.includes(n));
        };

        // Detect if a filename is the all-staff monthly summary format
        const isAllStaffFile = (filename) => {
            return /Fandora工作日誌_\d{4}年\d{1,2}月/i.test(filename);
        };

        // Convert Excel serial date number to YYYY-MM-DD string
        const excelDateToString = (serial) => {
            if (typeof serial === 'string') {
                // Already a date string, try to parse it
                const m = serial.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
                if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
                return serial;
            }
            if (typeof serial !== 'number' || serial < 1) return null;
            // Excel epoch: 1900-01-01 = 1, but JS Date epoch is 1970-01-01
            // Excel has a leap year bug (1900 is not a leap year but Excel thinks it is)
            const utcDays = Math.floor(serial) - 25569;
            const d = new Date(utcDays * 86400 * 1000);
            const yyyy = d.getUTCFullYear();
            const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
            const dd = String(d.getUTCDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        };

        // Extract employee name from individual filename like "工作日誌_2026年_茹津"
        // Returns null for all-staff files (employee names come from column headers)
        const extractEmployeeName = (filename) => {
            // All-staff summary files have no single employee — return null
            if (isAllStaffFile(filename)) return null;
            const m = filename.match(/工作日誌_\d{4}年_(.+?)(?:\.xlsx?)?$/i);
            if (m) return m[1].trim();
            // Fallback: try last segment after underscore
            const parts = filename.replace(/\.xlsx?$/i, '').split('_');
            const last = parts.length > 1 ? parts[parts.length - 1].trim() : null;
            // Guard: if fallback looks like a month (e.g. "01月"), return null
            if (last && /^\d{1,2}月$/.test(last)) return null;
            return last;
        };

        // Extract year from filename like "工作日誌_2026年_茹津"
        const extractYearFromFilename = (filename) => {
            const m = filename.match(/(\d{4})年/);
            return m ? parseInt(m[1]) : new Date().getFullYear();
        };

        // Parse all-staff file — 明細總表 ONLY (cross-tab removed: unreliable sheet names)
        const parseAllStaffFile = (workbook, filename) => {
            const fileYear = extractYearFromFilename(filename);
            const monthMatch = filename.match(/(\d{4})年(\d{1,2})月/);
            const fileMonthNum = monthMatch ? parseInt(monthMatch[2]) : 1;
            const fileMonthStr = `${fileYear}-${String(fileMonthNum).padStart(2, '0')}`;

            if (!workbook.SheetNames.includes('明細總表')) {
                console.warn(`All-staff file ${filename}: no 明細總表 sheet, skipping`);
                return [];
            }

            const ws = workbook.Sheets['明細總表'];
            const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
            if (rows.length < 2) return [];

            return parseDetailSheet(rows, fileYear, fileMonthStr);
        };

        // Parse 明細總表 — flexible header detection for multiple layouts:
        // Layout A (2025-09/10, 2026-01): 員工姓名, 部門, 日期, 應上下班時段, 工作開始/結束時間, 總工作時段, 工作內容說明, 實際時數
        // Layout B (2026-02): 員工姓名, 日期, 星期, 授權IP, 工作項目, (empty), (empty), 實際時數
        const parseDetailSheet = (rows, fileYear, fileMonthStr) => {
            // Find header row — search first 10 rows for one containing '員工姓名'
            let headerIdx = -1;
            for (let i = 0; i < Math.min(10, rows.length); i++) {
                const row = rows[i];
                if (row && row.some(c => String(c).trim() === '員工姓名')) {
                    headerIdx = i;
                    break;
                }
            }
            if (headerIdx < 0) return [];

            const headers = rows[headerIdx].map(h => String(h).trim());
            const col = {};
            headers.forEach((h, i) => {
                if (h === '員工姓名' && col.name === undefined) col.name = i;
                if (h === '部門') col.dept = i;
                if (h === '日期') col.date = i;
                if (h === '星期') col.weekday = i;
                if (h === '授權IP') col.ip = i;
                // Accept both '工作內容說明' and '工作項目'
                if ((h === '工作內容說明' || h === '工作項目') && col.task === undefined) col.task = i;
                if (h === '實際時數' && col.hours === undefined) col.hours = i;
            });

            // Must have at least name + some task/hours columns
            if (col.name === undefined) return [];
            // Fallback: if no task column found, try col after IP or weekday
            if (col.task === undefined) {
                // Try positional: task is usually at index 4 or after 授權IP
                if (col.ip !== undefined) col.task = col.ip + 1;
                else col.task = 3;
            }
            if (col.hours === undefined) {
                // Try to find the last numeric-looking header or use index 7
                col.hours = headers.length >= 8 ? 7 : headers.length - 1;
            }

            const records = [];
            let lastEmployee = '', lastDept = '', lastDateStr = '', lastIp = '';

            for (let i = headerIdx + 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;

                // Employee name — carry forward if empty, normalize to real name
                const empRaw = col.name !== undefined ? String(row[col.name] || '').trim() : '';
                if (empRaw && !/^(合計|總計|小計)/.test(empRaw)) lastEmployee = normalizeEmployeeName(empRaw);
                if (!lastEmployee) continue;
                // Skip summary rows
                if (/^(合計|總計|小計)/.test(empRaw)) continue;

                // Department — carry forward; fallback to EMPLOYEE_DEPT_MAP
                const deptRaw = col.dept !== undefined ? String(row[col.dept] || '').trim() : '';
                if (deptRaw) lastDept = deptRaw;
                const dept = lastDept || EMPLOYEE_DEPT_MAP[lastEmployee] || '未分類';

                // IP Project — carry forward if empty
                const ipRaw = col.ip !== undefined ? String(row[col.ip] || '').trim() : '';
                if (ipRaw) lastIp = ipRaw;

                // Date — carry forward if empty
                const dateRaw = col.date !== undefined ? row[col.date] : '';
                if (dateRaw !== '' && dateRaw !== null && dateRaw !== undefined) {
                    const parsed = parseDateValue(dateRaw, fileYear);
                    if (parsed) lastDateStr = parsed;
                }
                if (!lastDateStr) continue;

                // Task
                const task = String(row[col.task] || '').trim();
                if (!task || task === '無資料') continue;
                if (/^(合計|總計|小計|Total|total|SUM)$/i.test(task)) continue;

                // IP classification
                const taskIsIP = isKnownIP(task);
                let ipProject;
                if (col.ip !== undefined && lastIp) {
                    ipProject = lastIp;
                } else if (taskIsIP) {
                    ipProject = task;
                } else {
                    ipProject = '非授權IP';
                }
                const workType = taskIsIP ? 'IP相關作業' : task;

                // Hours
                const hours = parseFloat(row[col.hours]) || 0;
                if (hours <= 0) continue;

                // CRITICAL: Use fileMonthStr (from filename) as authoritative month
                // because 11月/12月 files have wrong dates (all show 2025-10)
                const dateMatch = lastDateStr.match(/^(\d{4})-(\d{2})/);
                const dataMonth = dateMatch ? `${dateMatch[1]}-${dateMatch[2]}` : null;
                // If data month differs from filename month, trust filename
                const month = fileMonthStr || dataMonth || `${fileYear}-01`;

                // Also fix the date to use the correct month from filename
                let correctedDate = lastDateStr;
                if (fileMonthStr && dataMonth && dataMonth !== fileMonthStr) {
                    // Replace YYYY-MM in the date with the filename month
                    const dayPart = lastDateStr.slice(7); // "-DD"
                    correctedDate = fileMonthStr + dayPart;
                }

                records.push({
                    name: lastEmployee,
                    dept: dept,
                    date: correctedDate,
                    task: task,
                    ipProject: ipProject,
                    workType: workType,
                    hours: hours,
                    month: month
                });
            }
            return records;
        };

        // Robust date parser — handles serial numbers, "YYYY/MM/DD（x）", "M/D", etc.
        const parseDateValue = (raw, defaultYear) => {
            if (typeof raw === 'number' && raw > 40000) {
                return excelDateToString(raw);
            }
            const s = String(raw).trim();
            if (!s) return null;
            // "2026/01/02（四）" or "2026/01/02"
            const fullMatch = s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
            if (fullMatch) {
                return `${fullMatch[1]}-${fullMatch[2].padStart(2,'0')}-${fullMatch[3].padStart(2,'0')}`;
            }
            // "M/D" format (no year)
            const mdMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
            if (mdMatch) {
                const y = defaultYear || new Date().getFullYear();
                return `${y}-${mdMatch[1].padStart(2,'0')}-${mdMatch[2].padStart(2,'0')}`;
            }
            return null;
        };

        const parseWorkLogExcel = (file, filename) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array', cellDates: false });

                        // All-staff file → 明細總表 only
                        if (isAllStaffFile(filename)) {
                            resolve(parseAllStaffFile(workbook, filename));
                            return;
                        }

                        // Individual employee file → iterate month sheets
                        const employeeName = extractEmployeeName(filename);
                        const fileYear = extractYearFromFilename(filename);
                        const realName = normalizeEmployeeName(employeeName);
                        const dept = EMPLOYEE_DEPT_MAP[realName] || '未分類';

                        const allRecords = [];

                        for (const sheetName of workbook.SheetNames) {
                            const monthMatch = sheetName.match(/^(\d{1,2})月$/);
                            if (!monthMatch) continue;

                            const monthNum = parseInt(monthMatch[1]);
                            const monthStr = `${fileYear}-${String(monthNum).padStart(2, '0')}`;

                            const worksheet = workbook.Sheets[sheetName];
                            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });

                            const records = parseWorkLogRows(rows, employeeName, dept, monthStr, fileYear, monthNum);
                            allRecords.push(...records);
                        }

                        resolve(allRecords);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        // Individual format: 日期(0), 星期(1), 授權IP(2), 工作項目(3), 開始(4), 結束(5), 實際時數(6)
        // Handles: "z" instead of "日期" (小智's sheet), carry-forward dates, name normalization
        const parseWorkLogRows = (rows, employeeName, dept, defaultMonth, fileYear, sheetMonth) => {
            if (rows.length < 2) return [];

            // Normalize employee name to real name
            const realName = normalizeEmployeeName(employeeName);
            const realDept = EMPLOYEE_DEPT_MAP[realName] || dept || '未分類';

            // Find header row — look for '日期', '工作項目', '實際時數', or positional fallback
            let headerIdx = -1;
            for (let i = 0; i < Math.min(8, rows.length); i++) {
                const row = rows[i];
                if (!row) continue;
                const rowStr = row.map(c => String(c).trim());
                // Match if row contains at least one known header keyword
                if (rowStr.some(s => ['日期', '工作項目', '實際時數', '授權IP', '星期'].includes(s))) {
                    headerIdx = i;
                    break;
                }
            }

            // If no header found by keyword, use positional heuristic:
            // Check if row 0 looks like a header (first cell is text, not a date/number)
            if (headerIdx < 0) {
                for (let i = 0; i < Math.min(5, rows.length); i++) {
                    const row = rows[i];
                    if (!row || row.length < 4) continue;
                    const first = String(row[0]).trim().toLowerCase();
                    // "z" is a known typo for "日期" in 小智's sheet
                    if (first === 'z' || first === '日期' || /^[a-z\u4e00-\u9fff]/.test(first)) {
                        headerIdx = i;
                        break;
                    }
                }
            }
            if (headerIdx < 0) headerIdx = 0;

            const headers = rows[headerIdx] || [];
            const colIdx = {};
            headers.forEach((h, i) => {
                const key = String(h).trim();
                if (key === '日期' || key === 'z') colIdx.date = i;  // "z" = typo for 日期
                if (key === '星期') colIdx.weekday = i;
                if (key === '授權IP') colIdx.ip = i;
                if (key === '工作項目') colIdx.task = i;
                if (key === '工作開始時間') colIdx.startTime = i;
                if (key === '工作結束時間') colIdx.endTime = i;
                if (key === '實際時數') colIdx.hours = i;
            });

            // Positional fallback: standard layout is date(0), weekday(1), IP(2), task(3), start(4), end(5), hours(6)
            if (colIdx.date === undefined) colIdx.date = 0;
            if (colIdx.task === undefined) colIdx.task = 3;
            if (colIdx.hours === undefined) colIdx.hours = 6;

            const records = [];
            let lastDateStr = null;

            for (let i = headerIdx + 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;

                // Skip template/example rows
                const firstCell = String(row[colIdx.date] || '').trim();
                if (/^(範例|日期|z)$/i.test(firstCell)) continue;

                // Parse date
                const dateRaw = row[colIdx.date];
                let dateStr = null;
                if (dateRaw !== '' && dateRaw !== null && dateRaw !== undefined) {
                    if (typeof dateRaw === 'number' && dateRaw > 40000) {
                        dateStr = excelDateToString(dateRaw);
                    } else if (typeof dateRaw === 'string' && dateRaw.trim()) {
                        dateStr = parseDateValue(dateRaw, fileYear);
                    }
                }
                if (dateStr) lastDateStr = dateStr;
                if (!lastDateStr) continue;

                // Task
                const taskRaw = row[colIdx.task];
                const task = String(taskRaw || '').trim();
                if (!task) continue;
                if (/^(合計|總計|小計|Total|total|SUM)$/i.test(task)) continue;
                if (/^\d+\.?\d*$/.test(task) && parseFloat(task) < 100) continue;

                // IP classification
                const ipRaw = colIdx.ip !== undefined ? String(row[colIdx.ip] || '').trim() : '';
                const taskIsIPCheck = isKnownIP(task);
                let ipProject;
                if (ipRaw) {
                    ipProject = ipRaw;
                } else if (taskIsIPCheck) {
                    ipProject = task;
                } else {
                    ipProject = '非授權IP';
                }
                const workType = taskIsIPCheck ? 'IP相關作業' : task;

                // Hours
                const hours = parseFloat(row[colIdx.hours]) || 0;
                if (hours <= 0) continue;

                // Month: use defaultMonth (derived from sheet name like "2月" → "2026-02")
                const dm = lastDateStr.match(/^(\d{4})-(\d{2})/);
                const month = defaultMonth || (dm ? `${dm[1]}-${dm[2]}` : `${fileYear}-01`);

                records.push({
                    name: realName || '未知',
                    dept: realDept,
                    date: lastDateStr,
                    task: task,
                    ipProject: ipProject,
                    workType: workType,
                    hours: hours,
                    month: month
                });
            }

            return records;
        };

        const parseSalaryExcel = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheetName = '薪資';
                        if (!workbook.SheetNames.includes(sheetName)) {
                            reject(new Error(`Sheet '${sheetName}' not found`));
                            return;
                        }
                        const worksheet = workbook.Sheets[sheetName];
                        const rows = XLSX.utils.sheet_to_json(worksheet);
                        resolve(rows);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        // Main Dashboard Component
        const FandoraDashboard = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [workLogs, setWorkLogs] = useState([]);
            const [salaryData, setSalaryData] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState('all');
            const [dateFrom, setDateFrom] = useState('');
            const [dateTo, setDateTo] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState(null);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gdrive_api_key') || '');
            const [folderId, setFolderId] = useState(localStorage.getItem('gdrive_folder_id') || '');
            const [costSheetId, setCostSheetId] = useState(localStorage.getItem('gdrive_cost_sheet_id') || '');
            const [testingConnection, setTestingConnection] = useState(false);
            const [selectedProject, setSelectedProject] = useState('all');
            const [selectedWorkType, setSelectedWorkType] = useState('all');
            const [selectedEmployee, setSelectedEmployee] = useState('all');
            const [selectedDept, setSelectedDept] = useState('all');

            // Auto-load data on mount
            useEffect(() => {
                if (apiKey && folderId) {
                    loadDataFromGDrive();
                }
            }, []);

            // Fetch cost data from a Google Sheet via Drive API export (CSV)
            const fetchCostFromGSheet = async (sheetId) => {
                const url = `https://www.googleapis.com/drive/v3/files/${sheetId}/export?mimeType=text/csv&key=${apiKey}`;
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`Google Sheet export error: ${resp.statusText}`);
                const csvText = await resp.text();
                const rows = csvText.split('\n').map(row => {
                    // Parse CSV respecting quoted fields
                    const cells = [];
                    let current = '';
                    let inQuotes = false;
                    for (let i = 0; i < row.length; i++) {
                        const ch = row[i];
                        if (ch === '"') { inQuotes = !inQuotes; }
                        else if (ch === ',' && !inQuotes) { cells.push(current.trim()); current = ''; }
                        else if (ch !== '\r') { current += ch; }
                    }
                    cells.push(current.trim());
                    return cells;
                });
                if (rows.length < 2) return [];
                const header = rows[0]; // ['', '人事費', '房租場租', '硬體系統費用', '雜費', '總計']
                const data = [];
                for (let i = 1; i < rows.length; i++) {
                    const cells = rows[i];
                    if (!cells[0]) continue;
                    // Parse month: "2025/9" → "2025-09"
                    const parts = cells[0].split('/');
                    if (parts.length < 2) continue;
                    const month = `${parts[0]}-${parts[1].padStart(2, '0')}`;
                    const parseCurrency = (s) => parseFloat((s || '').replace(/[$,¥￥\s]/g, '')) || 0;
                    const totalVal = parseCurrency(cells[5]);
                    if (totalVal === 0) continue; // skip empty months
                    const record = {
                        '月份': month,
                        '月薪': totalVal,
                        '人事費': parseCurrency(cells[1]),
                        '房租場租': parseCurrency(cells[2]),
                        '硬體系統費用': parseCurrency(cells[3]),
                        '雜費': parseCurrency(cells[4]),
                        '總計': totalVal
                    };
                    data.push(record);
                }
                console.log(`✅ Cost Sheet: ${data.length} months loaded`, data);
                return data;
            };

            const loadDataFromGDrive = useCallback(async () => {
                setLoading(true);
                setMessage(null);
                try {
                    const workLogsData = await fetchFilesFromGDrive(folderId, 'work');
                    let salariesData = [];
                    if (costSheetId) {
                        try {
                            salariesData = await fetchCostFromGSheet(costSheetId);
                        } catch (e) {
                            console.error('Cost sheet load failed:', e);
                        }
                    }
                    setWorkLogs(workLogsData);
                    setSalaryData(salariesData);
                    setMessage({ type: 'success', text: `資料載入成功${salariesData.length > 0 ? `（含 ${salariesData.length} 月費用資料）` : ''}` });
                } catch (error) {
                    setMessage({ type: 'error', text: `載入失敗: ${error.message}` });
                }
                setLoading(false);
            }, [apiKey, folderId, costSheetId]);

            const listFolderFiles = async (fId) => {
                const allFiles = [];
                let pageToken = '';
                do {
                    const q = encodeURIComponent(`'${fId}' in parents and trashed=false`);
                    let url = `https://www.googleapis.com/drive/v3/files?q=${q}&key=${apiKey}&fields=nextPageToken,files(id,name,mimeType,modifiedTime)&pageSize=100&supportsAllDrives=true&includeItemsFromAllDrives=true`;
                    if (pageToken) url += `&pageToken=${pageToken}`;
                    const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
                    if (!resp.ok) throw new Error(`Google Drive API error: ${resp.statusText}`);
                    const json = await resp.json();
                    allFiles.push(...(json.files || []));
                    pageToken = json.nextPageToken || '';
                } while (pageToken);
                return allFiles;
            };

            const collectSpreadsheetFiles = async (fId, depth = 0) => {
                if (depth > 5) return [];
                const items = await listFolderFiles(fId);
                let spreadsheets = items.filter(f =>
                    f.name.toLowerCase().endsWith('.xlsx') ||
                    f.mimeType === 'application/vnd.google-apps.spreadsheet'
                );
                const subFolders = items.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
                for (const folder of subFolders) {
                    const subFiles = await collectSpreadsheetFiles(folder.id, depth + 1);
                    spreadsheets = spreadsheets.concat(subFiles);
                }
                return spreadsheets;
            };

            const fetchFileArrayBuffer = async (file) => {
                let fileResponse;
                if (file.mimeType === 'application/vnd.google-apps.spreadsheet') {
                    fileResponse = await fetch(
                        `https://www.googleapis.com/drive/v3/files/${file.id}/export?mimeType=application/vnd.openxmlformats-officedocument.spreadsheetml.sheet&key=${apiKey}`
                    );
                } else {
                    fileResponse = await fetch(
                        `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${apiKey}&supportsAllDrives=true`
                    );
                }
                if (!fileResponse.ok) throw new Error(`HTTP ${fileResponse.status}`);
                return fileResponse.arrayBuffer();
            };

            const fetchFilesFromGDrive = async (folderIdToUse, fileType) => {
                setMessage({ type: 'info', text: '正在掃描資料夾結構，請稍候...' });
                const files = await collectSpreadsheetFiles(folderIdToUse);
                setMessage({ type: 'info', text: `找到 ${files.length} 個試算表檔案，正在載入...` });
                const data = [];

                if (fileType === 'work') {
                    // Separate all-staff vs individual files
                    const allStaffFiles = files.filter(f => isAllStaffFile(f.name));
                    const individualFiles = files.filter(f => !isAllStaffFile(f.name));
                    const coveredMonths = new Set();

                    // Phase 1: All-staff files (authoritative — 明細總表 only, real names)
                    for (const file of allStaffFiles) {
                        try {
                            setMessage({ type: 'info', text: `載入全體統整: ${file.name}...` });
                            const arrayBuffer = await fetchFileArrayBuffer(file);
                            const mockFile = new File([arrayBuffer], file.name + '.xlsx');
                            const records = await parseWorkLogExcel(mockFile, file.name);
                            data.push(...records);
                            records.forEach(r => { if (r.month) coveredMonths.add(r.month); });
                            const months = [...new Set(records.map(r => r.month))].sort();
                            const employees = [...new Set(records.map(r => r.name))].sort();
                            console.log(`✅ All-staff: ${file.name} → ${records.length} records | months: ${months.join(',')} | employees: ${employees.join(',')}`);
                        } catch (error) {
                            console.error(`❌ All-staff failed: ${file.name}:`, error);
                        }
                    }

                    // Phase 2: Individual files — ONLY for months NOT covered by all-staff
                    for (const file of individualFiles) {
                        try {
                            const arrayBuffer = await fetchFileArrayBuffer(file);
                            const mockFile = new File([arrayBuffer], file.name + '.xlsx');
                            const records = await parseWorkLogExcel(mockFile, file.name);
                            // Keep only records for uncovered months
                            const newRecords = records.filter(r => !coveredMonths.has(r.month));
                            if (newRecords.length > 0) {
                                data.push(...newRecords);
                                const months = [...new Set(newRecords.map(r => r.month))].sort();
                                console.log(`✅ Individual: ${file.name} → ${newRecords.length} new records (months: ${months.join(',')}) | ${records.length - newRecords.length} skipped (covered)`);
                            } else {
                                console.log(`⏭️ Individual: ${file.name} → all ${records.length} records skipped (months covered by all-staff)`);
                            }
                        } catch (error) {
                            console.error(`❌ Individual failed: ${file.name}:`, error);
                        }
                    }

                    console.log(`\n📊 TOTAL: ${data.length} work records`);
                    console.log(`📅 Covered months: ${[...coveredMonths].sort().join(', ')}`);
                    const uniqueNames = [...new Set(data.map(r => r.name))].sort();
                    console.log(`👥 Unique employees (${uniqueNames.length}): ${uniqueNames.join(', ')}`);

                } else if (fileType === 'salary') {
                    // Salary files — only parse files that actually contain a '薪資' sheet
                    // Skip silently if no salary sheet found (avoids noise from work files in same folder)
                    for (const file of files) {
                        try {
                            const arrayBuffer = await fetchFileArrayBuffer(file);
                            const mockFile = new File([arrayBuffer], file.name + '.xlsx');
                            const records = await parseSalaryExcel(mockFile);
                            data.push(...records);
                            console.log(`✅ Salary: ${file.name} → ${records.length} records`);
                        } catch (error) {
                            // Only log if it's NOT the expected "Sheet '薪資' not found" error
                            if (!error.message.includes('薪資')) {
                                console.error(`❌ Salary failed: ${file.name}:`, error);
                            }
                        }
                    }
                }
                return data;
            };

            const handleSaveSettings = () => {
                localStorage.setItem('gdrive_api_key', apiKey);
                localStorage.setItem('gdrive_folder_id', folderId);
                localStorage.setItem('gdrive_cost_sheet_id', costSheetId);
                setMessage({ type: 'success', text: '设置已保存' });
            };

            const handleTestConnection = async () => {
                if (!apiKey || !folderId) {
                    setMessage({ type: 'error', text: '请填写 API Key 和文件夹 ID' });
                    return;
                }

                setTestingConnection(true);
                try {
                    const query = encodeURIComponent(`'${folderId}' in parents and trashed=false`);
                    const response = await fetch(
                        `https://www.googleapis.com/drive/v3/files?q=${query}&key=${apiKey}&fields=files(id,name)&pageSize=1&supportsAllDrives=true&includeItemsFromAllDrives=true`,
                        { headers: { 'Accept': 'application/json' } }
                    );

                    if (response.ok) {
                        const result = await response.json();
                        const count = (result.files || []).length;
                        setMessage({ type: 'success', text: `連接成功！資料夾中找到 ${count} 個項目，可以載入數據` });
                    } else {
                        const err = await response.json().catch(() => ({}));
                        setMessage({ type: 'error', text: `連接失敗 (${response.status}): ${err.error?.message || '請檢查 API Key 和資料夾 ID'}` });
                    }
                } catch (error) {
                    setMessage({ type: 'error', text: `连接测试失败: ${error.message}` });
                }
                setTestingConnection(false);
            };

            const handleWorkLogUpload = (files) => {
                const tasks = Array.from(files).map(file => parseWorkLogExcel(file, file.name));
                Promise.all(tasks)
                    .then(results => {
                        const allLogs = results.flat();
                        const merged = [...workLogs, ...allLogs];
                        setWorkLogs(merged);
                        setMessage({ type: 'success', text: `成功導入 ${allLogs.length} 條工作記錄（共 ${merged.length} 條）` });
                    })
                    .catch(error => {
                        setMessage({ type: 'error', text: `导入失败: ${error.message}` });
                    });
            };

            const handleSalaryUpload = (files) => {
                const tasks = Array.from(files).map(file => parseSalaryExcel(file));
                Promise.all(tasks)
                    .then(results => {
                        const allSalaries = results.flat();
                        setSalaryData([...salaryData, ...allSalaries]);
                        setMessage({ type: 'success', text: `成功导入 ${allSalaries.length} 条薪资记录` });
                    })
                    .catch(error => {
                        setMessage({ type: 'error', text: `导入失败: ${error.message}` });
                    });
            };

            // Filter data based on selected month AND date range
            const filteredLogs = useMemo(() => {
                let logs = workLogs;
                if (selectedMonth !== 'all') {
                    logs = logs.filter(log => log.month === selectedMonth);
                }
                if (dateFrom) {
                    logs = logs.filter(log => log.date >= dateFrom);
                }
                if (dateTo) {
                    logs = logs.filter(log => log.date <= dateTo);
                }
                return logs;
            }, [workLogs, selectedMonth, dateFrom, dateTo]);

            const filteredSalary = useMemo(() => {
                if (selectedMonth === 'all') return salaryData;
                return salaryData.filter(rec => {
                    const recordMonth = typeof rec['月份'] === 'string' ? rec['月份'] : `${rec['月份']}-01`;
                    return recordMonth.startsWith(selectedMonth);
                });
            }, [salaryData, selectedMonth]);

            // Calculate monthly total cost from salary data (sum of all 月薪 per month)
            const monthlyCostMap = useMemo(() => {
                const map = {};
                filteredSalary.forEach(sal => {
                    const month = String(sal['月份'] || '').substring(0, 7);
                    if (!month) return;
                    if (!map[month]) map[month] = 0;
                    map[month] += parseFloat(sal['月薪']) || 0;
                });
                return map;
            }, [filteredSalary]);

            // Calculate KPIs
            const kpis = useMemo(() => {
                const uniqueEmployees = _.uniqBy(filteredLogs, 'name').length;
                const uniqueProjects = _.uniq(filteredLogs.map(l => l.task)).length;
                const totalHours = _.sumBy(filteredLogs, 'hours');
                const avgHours = uniqueEmployees > 0 ? (totalHours / uniqueEmployees).toFixed(2) : 0;

                // Cost = sum of monthly total costs, allocated proportionally by hours
                let totalCost = 0;
                if (Object.keys(monthlyCostMap).length > 0) {
                    Object.keys(monthlyCostMap).forEach(month => {
                        totalCost += monthlyCostMap[month] || 0;
                    });
                }
                const avgHourlyRate = totalHours > 0 && totalCost > 0 ? (totalCost / totalHours).toFixed(2) : 0;

                return {
                    totalHours: totalHours.toFixed(2),
                    uniqueEmployees,
                    uniqueProjects,
                    avgHours,
                    totalCost: totalCost.toFixed(2),
                    avgHourlyRate
                };
            }, [filteredLogs, filteredSalary, monthlyCostMap]);

            // Project cost allocation: monthly total cost ÷ proportional hours
            const projectCosts = useMemo(() => {
                if (Object.keys(monthlyCostMap).length === 0) return [];
                // Calculate total hours per month
                const monthTotalHours = {};
                filteredLogs.forEach(log => {
                    if (!monthTotalHours[log.month]) monthTotalHours[log.month] = 0;
                    monthTotalHours[log.month] += log.hours;
                });
                // Allocate monthly cost to projects proportionally by hours
                const costs = {};
                filteredLogs.forEach(log => {
                    const ip = log.ipProject || '非授權IP';
                    if (!costs[ip]) costs[ip] = { name: ip, cost: 0, hours: 0 };
                    costs[ip].hours += log.hours;
                    const mCost = monthlyCostMap[log.month] || 0;
                    const mHours = monthTotalHours[log.month] || 1;
                    costs[ip].cost += (log.hours / mHours) * mCost;
                });
                return Object.values(costs).sort((a, b) => b.cost - a.cost);
            }, [filteredLogs, monthlyCostMap]);

            // Department cost allocation: same proportional logic
            const deptCosts = useMemo(() => {
                if (Object.keys(monthlyCostMap).length === 0) return [];
                const monthTotalHours = {};
                filteredLogs.forEach(log => {
                    if (!monthTotalHours[log.month]) monthTotalHours[log.month] = 0;
                    monthTotalHours[log.month] += log.hours;
                });
                const costs = {};
                filteredLogs.forEach(log => {
                    if (!costs[log.dept]) costs[log.dept] = { name: log.dept, cost: 0, hours: 0, members: new Set() };
                    costs[log.dept].hours += log.hours;
                    costs[log.dept].members.add(log.name);
                    const mCost = monthlyCostMap[log.month] || 0;
                    const mHours = monthTotalHours[log.month] || 1;
                    costs[log.dept].cost += (log.hours / mHours) * mCost;
                });
                return Object.values(costs).map(d => ({
                    ...d, members: Array.from(d.members), memberCount: d.members.size,
                    avgCostPerMember: d.members.size > 0 ? (d.cost / d.members.size).toFixed(0) : 0
                })).sort((a, b) => b.cost - a.cost);
            }, [filteredLogs, monthlyCostMap]);

            // Get all months
            const allMonths = useMemo(() => {
                const months = _.uniq(workLogs.map(log => log.month)).sort();
                return months;
            }, [workLogs]);

            // Get all projects (ipProject/授權IP)
            const allProjects = useMemo(() => {
                return _.uniq(filteredLogs.map(l => l.ipProject || '非授權IP')).sort();
            }, [filteredLogs]);

            // Get all employees
            const allEmployees = useMemo(() => {
                return _.uniqBy(filteredLogs, 'name').map(l => l.name).sort();
            }, [filteredLogs]);

            // Get all departments
            const allDepts = useMemo(() => {
                return _.uniq(filteredLogs.map(l => l.dept)).sort();
            }, [filteredLogs]);

            // Prepare data for charts
            const projectHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'ipProject');
                return Object.entries(data)
                    .map(([name, logs]) => ({ name: name || '非授權IP', hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => b.hours - a.hours)
                    .slice(0, 10);
            }, [filteredLogs]);

            const deptHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'dept');
                return Object.entries(data)
                    .map(([name, logs]) => ({ name, hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const employeeHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'name');
                return Object.entries(data)
                    .map(([name, logs]) => ({ name, hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const monthlyHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'month');
                return Object.entries(data)
                    .map(([month, logs]) => ({ month, hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => a.month.localeCompare(b.month));
            }, [filteredLogs]);

            // Project analysis (ipProject/授權IP)
            const projectStats = useMemo(() => {
                const projects = {};
                filteredLogs.forEach(log => {
                    const ip = log.ipProject || '非授權IP';
                    if (!projects[ip]) {
                        projects[ip] = {
                            name: ip,
                            hours: 0,
                            employees: new Set(),
                            depts: new Set(),
                            workTypes: new Set()
                        };
                    }
                    projects[ip].hours += log.hours;
                    projects[ip].employees.add(log.name);
                    projects[ip].depts.add(log.dept);
                    projects[ip].workTypes.add(log.workType || log.task);
                });

                return Object.values(projects)
                    .map(p => ({
                        ...p,
                        employees: Array.from(p.employees),
                        depts: Array.from(p.depts),
                        workTypes: Array.from(p.workTypes),
                        employeeCount: p.employees.size,
                        deptCount: p.depts.size,
                        workTypeCount: p.workTypes.size
                    }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const selectedProjectData = useMemo(() => {
                if (selectedProject === 'all') {
                    return projectStats.slice(0, 20);
                }
                return projectStats.filter(p => p.name === selectedProject || (p.name === selectedProject || p.ipProject === selectedProject));
            }, [projectStats, selectedProject]);

            // Work type hours
            const workTypeHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'workType');
                return Object.entries(data)
                    .map(([name, logs]) => ({ name, hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => b.hours - a.hours)
                    .slice(0, 15);
            }, [filteredLogs]);

            // Work type stats
            const workTypeStats = useMemo(() => {
                const types = {};
                filteredLogs.forEach(log => {
                    const wt = log.workType || log.task;
                    if (!types[wt]) {
                        types[wt] = { name: wt, hours: 0, employees: new Set(), depts: new Set(), ips: new Set() };
                    }
                    types[wt].hours += log.hours;
                    types[wt].employees.add(log.name);
                    types[wt].depts.add(log.dept);
                    if (log.ipProject && log.ipProject !== '非授權IP') types[wt].ips.add(log.ipProject);
                });
                return Object.values(types)
                    .map(t => ({
                        ...t,
                        employees: Array.from(t.employees),
                        depts: Array.from(t.depts),
                        ips: Array.from(t.ips),
                        employeeCount: t.employees.size,
                        deptCount: t.depts.size,
                        ipCount: t.ips.size
                    }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const selectedWorkTypeData = useMemo(() => {
                if (selectedWorkType === 'all') return workTypeStats.slice(0, 20);
                return workTypeStats.filter(w => w.name === selectedWorkType);
            }, [workTypeStats, selectedWorkType]);

            const allWorkTypes = useMemo(() => {
                return _.uniq(filteredLogs.map(l => l.workType || l.task)).sort();
            }, [filteredLogs]);

            // Employee analysis — NO salary/cost info to avoid misunderstanding
            const employeeStats = useMemo(() => {
                const employees = {};
                filteredLogs.forEach(log => {
                    if (!employees[log.name]) {
                        employees[log.name] = {
                            name: log.name,
                            dept: log.dept,
                            hours: 0,
                            tasks: new Set()
                        };
                    }
                    employees[log.name].hours += log.hours;
                    employees[log.name].tasks.add(log.task);
                });

                return Object.values(employees)
                    .map(e => ({
                        ...e,
                        tasks: Array.from(e.tasks),
                        taskCount: e.tasks.size
                    }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const selectedEmployeeData = useMemo(() => {
                if (selectedEmployee === 'all') {
                    return employeeStats;
                }
                return employeeStats.filter(e => e.name === selectedEmployee);
            }, [employeeStats, selectedEmployee]);

            // Department analysis
            const deptStats = useMemo(() => {
                const depts = {};
                filteredLogs.forEach(log => {
                    if (!depts[log.dept]) {
                        depts[log.dept] = {
                            name: log.dept,
                            hours: 0,
                            members: new Set(),
                            tasks: new Set(),
                            cost: 0
                        };
                    }
                    depts[log.dept].hours += log.hours;
                    depts[log.dept].members.add(log.name);
                    depts[log.dept].tasks.add(log.task);
                });

                return Object.values(depts)
                    .map(d => ({
                        ...d,
                        members: Array.from(d.members),
                        tasks: Array.from(d.tasks),
                        memberCount: d.members.size,
                        taskCount: d.tasks.size,
                        avgPerMember: d.members.size > 0 ? (d.hours / d.members.size).toFixed(2) : 0
                    }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const selectedDeptData = useMemo(() => {
                if (selectedDept === 'all') {
                    return deptStats;
                }
                return deptStats.filter(d => d.name === selectedDept);
            }, [deptStats, selectedDept]);

            // Phase 4: Monthly trend by project (top 5 IPs)
            const monthlyProjectTrend = useMemo(() => {
                const top5 = projectStats.slice(0, 5).map(p => p.name);
                const months = _.uniq(filteredLogs.map(l => l.month)).sort();
                return months.map(m => {
                    const entry = { month: m };
                    top5.forEach(ip => {
                        entry[ip] = _.sumBy(filteredLogs.filter(l => (l.ipProject || '非授權IP') === ip && l.month === m), 'hours');
                    });
                    return entry;
                });
            }, [filteredLogs, projectStats]);

            // Phase 4: Monthly trend by department
            const monthlyDeptTrend = useMemo(() => {
                const depts = _.uniq(filteredLogs.map(l => l.dept));
                const months = _.uniq(filteredLogs.map(l => l.month)).sort();
                return months.map(m => {
                    const entry = { month: m };
                    depts.forEach(d => {
                        entry[d] = _.sumBy(filteredLogs.filter(l => l.dept === d && l.month === m), 'hours');
                    });
                    return entry;
                });
            }, [filteredLogs]);

            // Phase 4: Monthly trend by employee (top 5)
            const monthlyEmployeeTrend = useMemo(() => {
                const top5 = employeeStats.slice(0, 5).map(e => e.name);
                const months = _.uniq(filteredLogs.map(l => l.month)).sort();
                return months.map(m => {
                    const entry = { month: m };
                    top5.forEach(emp => {
                        entry[emp] = _.sumBy(filteredLogs.filter(l => l.name === emp && l.month === m), 'hours');
                    });
                    return entry;
                });
            }, [filteredLogs, employeeStats]);

            return (
                <div>
                    <header className="header">
                        <div className="header-content">
                            <div className="header-title">Fandora</div>
                            <div className="header-subtitle">人工時管理系統</div>
                        </div>
                    </header>

                    <div className="nav-tabs">
                        {[
                            { id: 'overview', label: '總表' },
                            { id: 'projects', label: '專案分析' },
                            { id: 'workTypes', label: '工作項目分析' },
                            { id: 'employees', label: '員工分析' },
                            { id: 'departments', label: '部門分析' },
                            { id: 'settings', label: '設定' }
                        ].map(tab => (
                            <button
                                key={tab.id}
                                className={`nav-tab ${activeTab === tab.id ? 'active' : ''}`}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>

                    <div className="container">
                        {message && (
                            <div className={`alert alert-${message.type}`}>
                                {message.text}
                            </div>
                        )}

                        {activeTab !== 'settings' && (
                            <div className="toolbar" style={{flexWrap: 'wrap', gap: '12px'}}>
                                <div className="toolbar-group">
                                    <label className="toolbar-label">月份：</label>
                                    <select
                                        value={selectedMonth}
                                        onChange={(e) => setSelectedMonth(e.target.value)}
                                    >
                                        <option value="all">全部</option>
                                        {allMonths.map(month => (
                                            <option key={month} value={month}>{month}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="toolbar-group">
                                    <label className="toolbar-label">起始日：</label>
                                    <input
                                        type="date"
                                        value={dateFrom}
                                        onChange={(e) => setDateFrom(e.target.value)}
                                        style={{padding:'4px 8px',borderRadius:'4px',border:'1px solid #ddd'}}
                                    />
                                </div>
                                <div className="toolbar-group">
                                    <label className="toolbar-label">截止日：</label>
                                    <input
                                        type="date"
                                        value={dateTo}
                                        onChange={(e) => setDateTo(e.target.value)}
                                        style={{padding:'4px 8px',borderRadius:'4px',border:'1px solid #ddd'}}
                                    />
                                </div>
                                {(dateFrom || dateTo) && (
                                    <button
                                        className="btn"
                                        onClick={() => { setDateFrom(''); setDateTo(''); }}
                                        style={{padding:'4px 12px',fontSize:'13px'}}
                                    >
                                        清除日期
                                    </button>
                                )}
                                <button
                                    className="btn btn-primary"
                                    onClick={loadDataFromGDrive}
                                    disabled={!apiKey || !folderId || loading}
                                >
                                    {loading ? '載入中...' : '重新載入'}
                                </button>
                            </div>
                        )}

                        {/* Overview Tab */}
                        {activeTab === 'overview' && (
                            <div>
                                <div className="kpi-grid">
                                    <div className="kpi-card">
                                        <div className="kpi-label">總工時</div>
                                        <div className="kpi-value">{kpis.totalHours}</div>
                                        <div className="kpi-unit">小時</div>
                                    </div>
                                    <div className="kpi-card">
                                        <div className="kpi-label">員工人數</div>
                                        <div className="kpi-value">{kpis.uniqueEmployees}</div>
                                        <div className="kpi-unit">人</div>
                                    </div>
                                    <div className="kpi-card">
                                        <div className="kpi-label">專案數量</div>
                                        <div className="kpi-value">{kpis.uniqueProjects}</div>
                                        <div className="kpi-unit">個</div>
                                    </div>
                                    <div className="kpi-card">
                                        <div className="kpi-label">平均每人工時</div>
                                        <div className="kpi-value">{kpis.avgHours}</div>
                                        <div className="kpi-unit">小時</div>
                                    </div>
                                </div>

                                {filteredSalary.length > 0 && (
                                    <div className="kpi-grid">
                                        <div className="kpi-card">
                                            <div className="kpi-label">總管理費用</div>
                                            <div className="kpi-value">${Number(kpis.totalCost).toLocaleString()}</div>
                                            <div className="kpi-unit">NTD</div>
                                        </div>
                                        <div className="kpi-card">
                                            <div className="kpi-label">平均時薪成本</div>
                                            <div className="kpi-value">${Number(kpis.avgHourlyRate).toLocaleString()}</div>
                                            <div className="kpi-unit">NTD/小時</div>
                                        </div>
                                    </div>
                                )}

                                {monthlyHours.length > 0 && (
                                    <div className="chart-container">
                                        <div className="chart-title">月度工時對比</div>
                                        <ResponsiveContainer width="100%" height={300}>
                                            <BarChart data={monthlyHours}>
                                                <CartesianGrid strokeDasharray="3 3" />
                                                <XAxis dataKey="month" />
                                                <YAxis />
                                                <Tooltip />
                                                <Bar dataKey="hours" fill="#00BCD4" />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                )}

                                {projectHours.length > 0 && (
                                    <div className="responsive-grid">
                                        <div className="chart-container">
                                            <div className="chart-title">Top 10 工作分類</div>
                                            <ResponsiveContainer width="100%" height={300}>
                                                <PieChart>
                                                    <Pie
                                                        data={projectHours}
                                                        dataKey="hours"
                                                        nameKey="name"
                                                        outerRadius={80}
                                                        label={({name, percent}) => `${name} ${(percent * 100).toFixed(0)}%`}
                                                    >
                                                        {projectHours.map((_, index) => (
                                                            <Cell key={index} fill={COLORS[index % COLORS.length]} />
                                                        ))}
                                                    </Pie>
                                                    <Tooltip formatter={(value) => `${value.toFixed(1)}h`} />
                                                    <Legend />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>

                                        <div className="chart-container">
                                            <div className="chart-title">部門工時分佈</div>
                                            <ResponsiveContainer width="100%" height={300}>
                                                <BarChart
                                                    data={deptHours}
                                                    layout="vertical"
                                                >
                                                    <CartesianGrid strokeDasharray="3 3" />
                                                    <XAxis type="number" />
                                                    <YAxis dataKey="name" type="category" width={80} />
                                                    <Tooltip />
                                                    <Bar dataKey="hours" fill="#00BCD4" />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                )}

                                {employeeHours.length > 0 && (
                                    <div className="chart-container">
                                        <div className="chart-title">員工工時排行</div>
                                        <ResponsiveContainer width="100%" height={Math.max(200, employeeHours.length * 20)}>
                                            <BarChart
                                                data={employeeHours}
                                                layout="vertical"
                                            >
                                                <CartesianGrid strokeDasharray="3 3" />
                                                <XAxis type="number" />
                                                <YAxis dataKey="name" type="category" width={100} />
                                                <Tooltip />
                                                <Bar dataKey="hours" fill="#00BCD4" />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                )}

                                {projectCosts.length > 0 && (
                                    <div className="chart-container">
                                        <div className="chart-title">授權IP 成本分攤排行</div>
                                        <ResponsiveContainer width="100%" height={Math.max(200, projectCosts.length * 25)}>
                                            <BarChart data={projectCosts.slice(0, 10)} layout="vertical">
                                                <CartesianGrid strokeDasharray="3 3" />
                                                <XAxis type="number" />
                                                <YAxis dataKey="name" type="category" width={100} />
                                                <Tooltip formatter={(value) => `$${Number(value).toFixed(0)}`} />
                                                <Bar dataKey="cost" fill="#E91E63" />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                )}

                                {filteredLogs.length > 0 && (
                                    <div className="collapsible">
                                        <div className="collapsible-header"
                                            onClick={(e) => e.currentTarget.parentElement.classList.toggle('open')}
                                        >
                                            進階分析
                                            <span className="collapsible-toggle">▼</span>
                                        </div>
                                        <div className="collapsible-content">
                                            <AdvancedAnalyticsOverview
                                                logs={filteredLogs}
                                                salary={filteredSalary}
                                                projectStats={projectStats}
                                                employeeStats={employeeStats}
                                                monthlyProjectTrend={monthlyProjectTrend}
                                            />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Projects Tab */}
                        {activeTab === 'projects' && (
                            <div>
                                <div className="toolbar">
                                    <div className="toolbar-group">
                                        <label className="toolbar-label">專案：</label>
                                        <select
                                            value={selectedProject}
                                            onChange={(e) => setSelectedProject(e.target.value)}
                                        >
                                            <option value="all">全部</option>
                                            {projectStats.map(p => (
                                                <option key={p.name} value={p.name}>{p.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>

                                {projectStats.length > 0 && (
                                    <div className="responsive-grid">
                                        <div className="chart-container">
                                            <div className="chart-title">
                                                {selectedProject === 'all' ? 'Top 20 授權IP工時' : selectedProject}
                                            </div>
                                            <ResponsiveContainer width="100%" height={400}>
                                                <BarChart
                                                    data={selectedProjectData.slice(0, 20)}
                                                    layout="vertical"
                                                >
                                                    <CartesianGrid strokeDasharray="3 3" />
                                                    <XAxis type="number" />
                                                    <YAxis dataKey="name" type="category" width={150} />
                                                    <Tooltip />
                                                    <Bar dataKey="hours" fill="#00BCD4" />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                )}

                                {selectedProject !== 'all' && selectedProjectData.length > 0 && (
                                    <div>
                                        {selectedProjectData[0].employeeCount > 0 && (
                                            <div className="chart-container">
                                                <div className="chart-title">員工貢獻</div>
                                                <ResponsiveContainer width="100%" height={300}>
                                                    <BarChart
                                                        data={selectedProjectData[0].employees.map(emp => {
                                                            const hours = _.sumBy(
                                                                filteredLogs.filter(l =>
                                                                    (l.ipProject || '非授權IP') === selectedProject && l.name === emp
                                                                ),
                                                                'hours'
                                                            );
                                                            return { name: emp, hours };
                                                        })}
                                                    >
                                                        <CartesianGrid strokeDasharray="3 3" />
                                                        <XAxis dataKey="name" />
                                                        <YAxis />
                                                        <Tooltip />
                                                        <Bar dataKey="hours" fill="#FF6B6B" />
                                                    </BarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        )}

                                        {selectedProjectData[0].deptCount > 0 && (
                                            <div className="chart-container">
                                                <div className="chart-title">部門分佈</div>
                                                <ResponsiveContainer width="100%" height={300}>
                                                    <PieChart>
                                                        <Pie
                                                            data={selectedProjectData[0].depts.map(dept => {
                                                                const hours = _.sumBy(
                                                                    filteredLogs.filter(l =>
                                                                        (l.ipProject || '非授權IP') === selectedProject && l.dept === dept
                                                                    ),
                                                                    'hours'
                                                                );
                                                                return { name: dept, hours };
                                                            })}
                                                            dataKey="hours"
                                                            nameKey="name"
                                                            outerRadius={80}
                                                            label={({name, percent}) => `${name} ${(percent * 100).toFixed(0)}%`}
                                                        >
                                                            {selectedProjectData[0].depts.map((_, index) => (
                                                                <Cell key={index} fill={COLORS[index % COLORS.length]} />
                                                            ))}
                                                        </Pie>
                                                        <Tooltip formatter={(value) => `${value.toFixed(1)}h`} />
                                                        <Legend />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {projectStats.length > 0 && (
                                    <div className="table-container">
                                        <div className="chart-title">授權IP彙總</div>
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>授權IP</th>
                                                    <th>總工時</th>
                                                    <th>參與員工</th>
                                                    <th>部門數</th>
                                                    <th>工作項目數</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {projectStats.map((p, idx) => (
                                                    <tr key={idx}>
                                                        <td>{p.name}</td>
                                                        <td>{p.hours.toFixed(2)}</td>
                                                        <td>{p.employeeCount}</td>
                                                        <td>{p.deptCount}</td>
                                                        <td>{p.workTypeCount}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {filteredLogs.length > 0 && (
                                    <div className="collapsible">
                                        <div className="collapsible-header"
                                            onClick={(e) => e.currentTarget.parentElement.classList.toggle('open')}
                                        >
                                            進階分析
                                            <span className="collapsible-toggle">▼</span>
                                        </div>
                                        <div className="collapsible-content">
                                            <AdvancedAnalyticsProject
                                                projectStats={projectStats}
                                                logs={filteredLogs}
                                                monthlyProjectTrend={monthlyProjectTrend}
                                            />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Work Types Tab */}
                        {activeTab === 'workTypes' && (
