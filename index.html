    <style>

<body>
    <div id="root"></div>

    <script type="text/plain" id="app-script">
        const { useState, useEffect, useMemo, useCallback } = React;
        const {
            BarChart, Bar, LineChart, Line, PieChart, Pie, Cell,
            XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
            ComposedChart, Area
        } = Recharts;

        const COLORS = ['#00BCD4', '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A',
                        '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B88B'];

        // Excel parsing utilities

        // Department mapping — real names from 明細總表 + nicknames from individual files
        const EMPLOYEE_DEPT_MAP = {
            // Real names (from 全體當月統整 → 明細總表)
            '余凱紓': '後勤部', '李宜臻': '企劃部', '潘美怡': '後勤部',
            '許茹津': '商品開發部', '劉蕙慈': '企劃部', '陳姿羽': '管理部',
            '侯渝琪': '商品商發部', '吳佳香': '銷售部', '陳敏佳': '企劃部',
            '林宜萱': '後勤部', '陳敬文': '後勤部',
            // Nicknames (from 員工個人逐月紀錄) — best-effort mapping
            '小麥': '後勤部', '小智': '管理部', '妮佛': '管理部',
            '阿溫': '商品商發部', '茹津': '商品開發部', '敏佳': '企劃部',
            'Janet': '企劃部', 'Kate': '企劃部', 'Kerry': '商品開發部',
            'PAN': '後勤部', 'Stacy': '銷售部'
        };

        // Detect if a filename is the all-staff monthly summary format
        const isAllStaffFile = (filename) => {
            return /Fandora工作日誌_\d{4}年\d{1,2}月/i.test(filename);
        };

        // Convert Excel serial date number to YYYY-MM-DD string
        const excelDateToString = (serial) => {
            if (typeof serial === 'string') {
                // Already a date string, try to parse it
                const m = serial.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
                if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
                return serial;
            }
            if (typeof serial !== 'number' || serial < 1) return null;
            // Excel epoch: 1900-01-01 = 1, but JS Date epoch is 1970-01-01
            // Excel has a leap year bug (1900 is not a leap year but Excel thinks it is)
            const utcDays = Math.floor(serial) - 25569;
            const d = new Date(utcDays * 86400 * 1000);
            const yyyy = d.getUTCFullYear();
            const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
            const dd = String(d.getUTCDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        };

        // Extract employee name from individual filename like "工作日誌_2026年_茹津"
        // Returns null for all-staff files (employee names come from column headers)
        const extractEmployeeName = (filename) => {
            // All-staff summary files have no single employee — return null
            if (isAllStaffFile(filename)) return null;
            const m = filename.match(/工作日誌_\d{4}年_(.+?)(?:\.xlsx?)?$/i);
            if (m) return m[1].trim();
            // Fallback: try last segment after underscore
            const parts = filename.replace(/\.xlsx?$/i, '').split('_');
            const last = parts.length > 1 ? parts[parts.length - 1].trim() : null;
            // Guard: if fallback looks like a month (e.g. "01月"), return null
            if (last && /^\d{1,2}月$/.test(last)) return null;
            return last;
        };

        // Extract year from filename like "工作日誌_2026年_茹津"
        const extractYearFromFilename = (filename) => {
            const m = filename.match(/(\d{4})年/);
            return m ? parseInt(m[1]) : new Date().getFullYear();
        };

        // Parse all-staff file — prefer 明細總表 sheet (detailed rows), fallback to cross-tab
        const parseAllStaffFile = (workbook, filename) => {
            const fileYear = extractYearFromFilename(filename);
            const monthMatch = filename.match(/(\d{4})年(\d{1,2})月/);
            const fileMonthNum = monthMatch ? parseInt(monthMatch[2]) : 1;
            const defaultMonthStr = `${fileYear}-${String(fileMonthNum).padStart(2, '0')}`;

            // --- Strategy 1: Parse 明細總表 (detailed log rows) ---
            if (workbook.SheetNames.includes('明細總表')) {
                const ws = workbook.Sheets['明細總表'];
                const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                if (rows.length > 1) {
                    const records = parseDetailSheet(rows, fileYear, defaultMonthStr);
                    if (records.length > 0) return records;
                }
            }

            // --- Strategy 2: Parse cross-tab sheet (YYYY_MM) ---
            const allRecords = [];
            for (const sheetName of workbook.SheetNames) {
                const ymMatch = sheetName.match(/^(\d{4})[_\-](\d{1,2})$/);
                if (!ymMatch) continue;
                const year = parseInt(ymMatch[1]);
                const monthNum = parseInt(ymMatch[2]);
                const monthStr = `${year}-${String(monthNum).padStart(2, '0')}`;
                const ws = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                if (rows.length < 2) continue;
                const headers = rows[0].map(h => String(h).trim());
                if (headers[0] !== '工作內容說明') continue;
                const employeeNames = headers.slice(1).filter(n => n && n !== '');
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const task = String(row[0] || '').trim();
                    if (!task || task === '合計' || task === '總計' || task === 'Total') continue;
                    for (let j = 0; j < employeeNames.length; j++) {
                        const empName = employeeNames[j];
                        const hours = parseFloat(row[j + 1]) || 0;
                        if (hours <= 0) continue;
                        allRecords.push({
                            name: empName,
                            dept: EMPLOYEE_DEPT_MAP[empName] || '未分類',
                            date: `${year}-${String(monthNum).padStart(2, '0')}-01`,
                            task: task,
                            ipProject: '非授權IP',
                            workType: task,
                            hours: hours,
                            month: monthStr
                        });
                    }
                }
            }
            return allRecords;
        };

        // Parse 明細總表 format:
        // 員工姓名(A), 部門(B), 日期(C), 應上下班時段(D), 工作開始時間(E),
        // 工作結束時間(F), 總工作時段(G), 工作內容說明(H), 實際時數(I)
        const parseDetailSheet = (rows, fileYear, defaultMonthStr) => {
            // Find header row
            let headerIdx = -1;
            for (let i = 0; i < Math.min(5, rows.length); i++) {
                const row = rows[i];
                if (row && row.some(c => String(c).trim() === '員工姓名') &&
                    row.some(c => String(c).trim() === '工作內容說明')) {
                    headerIdx = i;
                    break;
                }
            }
            if (headerIdx < 0) return [];

            const headers = rows[headerIdx].map(h => String(h).trim());
            const col = {};
            headers.forEach((h, i) => {
                if (h === '員工姓名' && col.name === undefined) col.name = i;
                if (h === '部門') col.dept = i;
                if (h === '日期') col.date = i;
                if (h === '授權IP') col.ip = i;
                if (h === '工作內容說明' && col.task === undefined) col.task = i;
                if (h === '實際時數' && col.hours === undefined) col.hours = i;
            });

            if (col.task === undefined || col.hours === undefined) return [];

            const records = [];
            let lastEmployee = '', lastDept = '', lastDateStr = '', lastIp = '';

            for (let i = headerIdx + 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;

                // Employee name — carry forward if empty
                const empRaw = col.name !== undefined ? String(row[col.name] || '').trim() : '';
                if (empRaw) lastEmployee = empRaw;
                if (!lastEmployee) continue;

                // Department — carry forward if empty
                const deptRaw = col.dept !== undefined ? String(row[col.dept] || '').trim() : '';
                if (deptRaw) lastDept = deptRaw;
                const dept = lastDept || EMPLOYEE_DEPT_MAP[lastEmployee] || '未分類';

                // IP Project — carry forward if empty
                const ipRaw = col.ip !== undefined ? String(row[col.ip] || '').trim() : '';
                if (ipRaw) lastIp = ipRaw;
                const ipProject = lastIp || '非授權IP';

                // Date — carry forward if empty; parse "2026/01/02（四）" or serial
                const dateRaw = col.date !== undefined ? row[col.date] : '';
                if (dateRaw !== '' && dateRaw !== null && dateRaw !== undefined) {
                    const parsed = parseDateValue(dateRaw, fileYear);
                    if (parsed) lastDateStr = parsed;
                }
                if (!lastDateStr) continue;

                // Task (workType)
                const task = String(row[col.task] || '').trim();
                if (!task || task === '無資料') continue;

                // Hours
                const hours = parseFloat(row[col.hours]) || 0;
                if (hours <= 0) continue;

                const dateMatch = lastDateStr.match(/^(\d{4})-(\d{2})/);
                const month = dateMatch ? `${dateMatch[1]}-${dateMatch[2]}` : defaultMonthStr;

                records.push({
                    name: lastEmployee,
                    dept: dept,
                    date: lastDateStr,
                    task: task,
                    ipProject: ipProject,
                    workType: task,
                    hours: hours,
                    month: month
                });
            }
            return records;
        };

        // Robust date parser — handles serial numbers, "YYYY/MM/DD（x）", "M/D", etc.
        const parseDateValue = (raw, defaultYear) => {
            if (typeof raw === 'number' && raw > 40000) {
                return excelDateToString(raw);
            }
            const s = String(raw).trim();
            if (!s) return null;
            // "2026/01/02（四）" or "2026/01/02"
            const fullMatch = s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
            if (fullMatch) {
                return `${fullMatch[1]}-${fullMatch[2].padStart(2,'0')}-${fullMatch[3].padStart(2,'0')}`;
            }
            // "M/D" format (no year)
            const mdMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
            if (mdMatch) {
                const y = defaultYear || new Date().getFullYear();
                return `${y}-${mdMatch[1].padStart(2,'0')}-${mdMatch[2].padStart(2,'0')}`;
            }
            return null;
        };

        const parseWorkLogExcel = (file, filename) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array', cellDates: false });

                        // --- FORMAT DETECTION ---
                        // All-staff file: "Fandora工作日誌_2026年01月" → parse 明細總表 or cross-tab
                        if (isAllStaffFile(filename)) {
                            const records = parseAllStaffFile(workbook, filename);
                            resolve(records);
                            return;
                        }

                        // --- Individual employee format ---
                        const employeeName = extractEmployeeName(filename);
                        const fileYear = extractYearFromFilename(filename);
                        const dept = (employeeName && EMPLOYEE_DEPT_MAP[employeeName]) || '未分類';

                        const allRecords = [];

                        // Iterate through all month sheets (1月, 2月, ... 12月)
                        for (const sheetName of workbook.SheetNames) {
                            const monthMatch = sheetName.match(/^(\d{1,2})月$/);
                            if (!monthMatch) continue; // skip non-month sheets

                            const monthNum = parseInt(monthMatch[1]);
                            const monthStr = `${fileYear}-${String(monthNum).padStart(2, '0')}`;

                            const worksheet = workbook.Sheets[sheetName];
                            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });

                            const records = parseWorkLogRows(rows, employeeName, dept, monthStr, fileYear, monthNum);
                            allRecords.push(...records);
                        }

                        // If no month sheets found, try the first sheet as fallback
                        // But only if this is NOT an all-staff file (already handled above)
                        if (allRecords.length === 0 && workbook.SheetNames.length > 0) {
                            // Secondary detection: check if this is an all-staff file by sheet content
                            if (workbook.SheetNames.includes('明細總表') ||
                                workbook.SheetNames.some(s => /^\d{4}[_\-]\d{1,2}$/.test(s))) {
                                const records = parseAllStaffFile(workbook, filename);
                                if (records.length > 0) { resolve(records); return; }
                            }
                            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                            const firstRows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });

                            const rows = firstRows;
                            const monthMatch = filename.match(/(\d{4})年(\d{1,2})月/);
                            const monthStr = monthMatch
                                ? `${monthMatch[1]}-${String(parseInt(monthMatch[2])).padStart(2, '0')}`
                                : `${fileYear}-01`;
                            const records = parseWorkLogRows(rows, employeeName, dept, monthStr, fileYear, null);
                            allRecords.push(...records);
                        }

                        resolve(allRecords);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        // Individual format: 日期(0), 星期(1), 授權IP(2), 工作項目(3), 開始(4), 結束(5), 實際時數(6)
        // KEY FIX: continuation rows have empty date — carry forward the last valid date
        const parseWorkLogRows = (rows, employeeName, dept, defaultMonth, fileYear, sheetMonth) => {
            if (rows.length < 2) return [];

            // Find header row
            let headerIdx = 0;
            for (let i = 0; i < Math.min(5, rows.length); i++) {
                const row = rows[i];
                if (row && row.some(cell => {
                    const s = String(cell).trim();
                    return s === '日期' || s === '工作項目' || s === '實際時數';
                })) {
                    headerIdx = i;
                    break;
                }
            }

            const headers = rows[headerIdx] || [];
            const colIdx = {};
            headers.forEach((h, i) => {
                const key = String(h).trim();
                if (key === '日期') colIdx.date = i;
                if (key === '星期') colIdx.weekday = i;
                if (key === '授權IP') colIdx.ip = i;
                if (key === '工作項目') colIdx.task = i;
                if (key === '工作開始時間') colIdx.startTime = i;
                if (key === '工作結束時間') colIdx.endTime = i;
                if (key === '實際時數') colIdx.hours = i;
            });

            // Positional fallback only if headers not detected
            if (colIdx.date === undefined) colIdx.date = 0;
            if (colIdx.task === undefined) colIdx.task = 3;
            if (colIdx.hours === undefined) colIdx.hours = 6;

            const records = [];
            let lastDateStr = null; // For carrying forward date to continuation rows

            for (let i = headerIdx + 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;

                // Skip template/example rows
                const firstCell = String(row[colIdx.date] || '').trim();
                if (/^範例/.test(firstCell)) continue;
                if (firstCell === '日期') continue;

                // Parse date — use parseDateValue, carry forward for continuation rows
                const dateRaw = row[colIdx.date];
                let dateStr = null;
                if (dateRaw !== '' && dateRaw !== null && dateRaw !== undefined) {
                    if (typeof dateRaw === 'number') {
                        if (dateRaw > 40000) {
                            dateStr = excelDateToString(dateRaw);
                        }
                        // Small numbers (< 40000) could be M/D misread — try parseDateValue
                    } else if (typeof dateRaw === 'string' && dateRaw.trim()) {
                        dateStr = parseDateValue(dateRaw, fileYear);
                    }
                }

                // Update or carry forward date
                if (dateStr) {
                    lastDateStr = dateStr;
                }
                // If no date and no previous date, skip
                if (!lastDateStr) continue;

                // Parse task (workType) — must be a text string, not a number
                const taskRaw = row[colIdx.task];
                const task = String(taskRaw || '').trim();
                if (!task) continue;
                // Guard: skip if task looks like a pure number (time fraction or serial)
                if (/^\d+\.?\d*$/.test(task) && parseFloat(task) < 100) continue;

                // Parse ipProject (授權IP)
                const ipRaw = colIdx.ip !== undefined ? row[colIdx.ip] : '';
                const ipProject = String(ipRaw || '').trim() || '非授權IP';

                // Parse hours
                const hoursRaw = row[colIdx.hours];
                const hours = parseFloat(hoursRaw) || 0;
                if (hours <= 0) continue;

                // Derive month
                const dm = lastDateStr.match(/^(\d{4})-(\d{2})/);
                const month = dm ? `${dm[1]}-${dm[2]}` : defaultMonth;

                records.push({
                    name: employeeName || '未知',
                    dept: dept || '未分類',
                    date: lastDateStr,
                    task: task,
                    ipProject: ipProject,
                    workType: task,
                    hours: hours,
                    month: month || defaultMonth || `${fileYear}-01`
                });
            }

            return records;
        };

        const parseSalaryExcel = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheetName = '薪資';
                        if (!workbook.SheetNames.includes(sheetName)) {
                            reject(new Error(`Sheet '${sheetName}' not found`));
                            return;
                        }
                        const worksheet = workbook.Sheets[sheetName];
                        const rows = XLSX.utils.sheet_to_json(worksheet);
                        resolve(rows);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        // Main Dashboard Component
        const FandoraDashboard = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [workLogs, setWorkLogs] = useState([]);
            const [salaryData, setSalaryData] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState('all');
            const [dateFrom, setDateFrom] = useState('');
            const [dateTo, setDateTo] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState(null);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gdrive_api_key') || '');
            const [folderId, setFolderId] = useState(localStorage.getItem('gdrive_folder_id') || '');
            const [salaryFolderId, setSalaryFolderId] = useState(localStorage.getItem('gdrive_salary_folder_id') || '');
            const [testingConnection, setTestingConnection] = useState(false);
            const [selectedProject, setSelectedProject] = useState('all');
            const [selectedWorkType, setSelectedWorkType] = useState('all');
            const [selectedEmployee, setSelectedEmployee] = useState('all');
            const [selectedDept, setSelectedDept] = useState('all');

            // Auto-load data on mount
            useEffect(() => {
                if (apiKey && folderId) {
                    loadDataFromGDrive();
                }
            }, []);

            const loadDataFromGDrive = useCallback(async () => {
                setLoading(true);
                setMessage(null);
                try {
                    const workLogsData = await fetchFilesFromGDrive(folderId, 'work');
                    const salariesData = await fetchFilesFromGDrive(salaryFolderId || folderId, 'salary');
                    setWorkLogs(workLogsData);
                    setSalaryData(salariesData);
                    setMessage({ type: 'success', text: '数据加载成功' });
                } catch (error) {
                    setMessage({ type: 'error', text: `加载失败: ${error.message}` });
                }
                setLoading(false);
            }, [apiKey, folderId, salaryFolderId]);

            const listFolderFiles = async (fId) => {
                const allFiles = [];
                let pageToken = '';
                do {
                    const q = encodeURIComponent(`'${fId}' in parents and trashed=false`);
                    let url = `https://www.googleapis.com/drive/v3/files?q=${q}&key=${apiKey}&fields=nextPageToken,files(id,name,mimeType,modifiedTime)&pageSize=100&supportsAllDrives=true&includeItemsFromAllDrives=true`;
                    if (pageToken) url += `&pageToken=${pageToken}`;
                    const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
                    if (!resp.ok) throw new Error(`Google Drive API error: ${resp.statusText}`);
                    const json = await resp.json();
                    allFiles.push(...(json.files || []));
                    pageToken = json.nextPageToken || '';
                } while (pageToken);
                return allFiles;
            };

            const collectSpreadsheetFiles = async (fId, depth = 0) => {
                if (depth > 5) return [];
                const items = await listFolderFiles(fId);
                let spreadsheets = items.filter(f =>
                    f.name.toLowerCase().endsWith('.xlsx') ||
                    f.mimeType === 'application/vnd.google-apps.spreadsheet'
                );
                const subFolders = items.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
                for (const folder of subFolders) {
                    const subFiles = await collectSpreadsheetFiles(folder.id, depth + 1);
                    spreadsheets = spreadsheets.concat(subFiles);
                }
                return spreadsheets;
            };

            const fetchFilesFromGDrive = async (folderIdToUse, fileType) => {
                setMessage({ type: 'info', text: '正在掃描資料夾結構，請稍候...' });
                const files = await collectSpreadsheetFiles(folderIdToUse);
                setMessage({ type: 'info', text: `找到 ${files.length} 個試算表檔案，正在載入...` });
                const data = [];

                for (const file of files) {
                    try {
                        let fileResponse;
                        if (file.mimeType === 'application/vnd.google-apps.spreadsheet') {
                            fileResponse = await fetch(
                                `https://www.googleapis.com/drive/v3/files/${file.id}/export?mimeType=application/vnd.openxmlformats-officedocument.spreadsheetml.sheet&key=${apiKey}`
                            );
                        } else {
                            fileResponse = await fetch(
                                `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${apiKey}&supportsAllDrives=true`
                            );
                        }
                        if (!fileResponse.ok) {
                            console.error(`Failed to download ${file.name}: ${fileResponse.status}`);
                            continue;
                        }
                        const arrayBuffer = await fileResponse.arrayBuffer();

                        if (fileType === 'work') {
                            const mockFile = new File([arrayBuffer], file.name + '.xlsx');
                            const records = await parseWorkLogExcel(mockFile, file.name);
                            data.push(...records);
                        } else if (fileType === 'salary') {
                            const mockFile = new File([arrayBuffer], file.name + '.xlsx');
                            const records = await parseSalaryExcel(mockFile);
                            data.push(...records);
                        }
                    } catch (error) {
                        console.error(`Failed to parse ${file.name}:`, error);
                    }
                }
                return data;
            };

            const handleSaveSettings = () => {
                localStorage.setItem('gdrive_api_key', apiKey);
                localStorage.setItem('gdrive_folder_id', folderId);
                localStorage.setItem('gdrive_salary_folder_id', salaryFolderId);
                setMessage({ type: 'success', text: '设置已保存' });
            };

            const handleTestConnection = async () => {
                if (!apiKey || !folderId) {
                    setMessage({ type: 'error', text: '请填写 API Key 和文件夹 ID' });
                    return;
                }

                setTestingConnection(true);
                try {
                    const query = encodeURIComponent(`'${folderId}' in parents and trashed=false`);
                    const response = await fetch(
                        `https://www.googleapis.com/drive/v3/files?q=${query}&key=${apiKey}&fields=files(id,name)&pageSize=1&supportsAllDrives=true&includeItemsFromAllDrives=true`,
                        { headers: { 'Accept': 'application/json' } }
                    );

                    if (response.ok) {
                        const result = await response.json();
                        const count = (result.files || []).length;
                        setMessage({ type: 'success', text: `連接成功！資料夾中找到 ${count} 個項目，可以載入數據` });
                    } else {
                        const err = await response.json().catch(() => ({}));
                        setMessage({ type: 'error', text: `連接失敗 (${response.status}): ${err.error?.message || '請檢查 API Key 和資料夾 ID'}` });
                    }
                } catch (error) {
                    setMessage({ type: 'error', text: `连接测试失败: ${error.message}` });
                }
                setTestingConnection(false);
            };

            const handleWorkLogUpload = (files) => {
                const tasks = Array.from(files).map(file => parseWorkLogExcel(file, file.name));
                Promise.all(tasks)
                    .then(results => {
                        const allLogs = results.flat();
                        setWorkLogs([...workLogs, ...allLogs]);
                        setMessage({ type: 'success', text: `成功导入 ${allLogs.length} 条工作记录` });
                    })
                    .catch(error => {
                        setMessage({ type: 'error', text: `导入失败: ${error.message}` });
                    });
            };

            const handleSalaryUpload = (files) => {
                const tasks = Array.from(files).map(file => parseSalaryExcel(file));
                Promise.all(tasks)
                    .then(results => {
                        const allSalaries = results.flat();
                        setSalaryData([...salaryData, ...allSalaries]);
                        setMessage({ type: 'success', text: `成功导入 ${allSalaries.length} 条薪资记录` });
                    })
                    .catch(error => {
                        setMessage({ type: 'error', text: `导入失败: ${error.message}` });
                    });
            };

            // Filter data based on selected month AND date range
            const filteredLogs = useMemo(() => {
                let logs = workLogs;
                if (selectedMonth !== 'all') {
                    logs = logs.filter(log => log.month === selectedMonth);
                }
                if (dateFrom) {
                    logs = logs.filter(log => log.date >= dateFrom);
                }
                if (dateTo) {
                    logs = logs.filter(log => log.date <= dateTo);
                }
                return logs;
            }, [workLogs, selectedMonth, dateFrom, dateTo]);

            const filteredSalary = useMemo(() => {
                if (selectedMonth === 'all') return salaryData;
                return salaryData.filter(rec => {
                    const recordMonth = typeof rec['月份'] === 'string' ? rec['月份'] : `${rec['月份']}-01`;
                    return recordMonth.startsWith(selectedMonth);
                });
            }, [salaryData, selectedMonth]);

            // Calculate KPIs
            const kpis = useMemo(() => {
                const uniqueEmployees = _.uniqBy(filteredLogs, 'name').length;
                const uniqueProjects = _.uniq(filteredLogs.map(l => l.task)).length;
                const totalHours = _.sumBy(filteredLogs, 'hours');
                const avgHours = uniqueEmployees > 0 ? (totalHours / uniqueEmployees).toFixed(2) : 0;

                let totalCost = 0;
                let avgHourlyRate = 0;

                if (filteredSalary.length > 0) {
                    filteredLogs.forEach(log => {
                        const salary = filteredSalary.find(s =>
                            s['員工姓名'] === log.name &&
                            s['月份'].includes(log.month)
                        );
                        if (salary) {
                            const monthlyHours = _.sumBy(
                                filteredLogs.filter(l => l.name === log.name && l.month === log.month),
                                'hours'
                            );
                            const hourlyRate = monthlyHours > 0 ? salary['月薪'] / monthlyHours : 0;
                            totalCost += hourlyRate * log.hours;
                        }
                    });
                    const totalWorked = filteredLogs.length > 0 ? totalHours : 1;
                    avgHourlyRate = (totalCost / totalWorked).toFixed(2);
                }

                return {
                    totalHours: totalHours.toFixed(2),
                    uniqueEmployees,
                    uniqueProjects,
                    avgHours,
                    totalCost: totalCost.toFixed(2),
                    avgHourlyRate
                };
            }, [filteredLogs, filteredSalary]);

            // Phase 3: Project cost allocation
            const projectCosts = useMemo(() => {
                if (filteredSalary.length === 0) return [];
                // Build employee monthly hourly rates
                const rates = {};
                filteredLogs.forEach(log => {
                    const key = `${log.name}_${log.month}`;
                    if (!rates[key]) {
                        const sal = filteredSalary.find(s => s['員工姓名'] === log.name && String(s['月份']).includes(log.month));
                        const monthHours = _.sumBy(filteredLogs.filter(l => l.name === log.name && l.month === log.month), 'hours');
                        rates[key] = sal && monthHours > 0 ? sal['月薪'] / monthHours : 0;
                    }
                });
                // Allocate to projects
                const costs = {};
                filteredLogs.forEach(log => {
                    const ip = log.ipProject || '非授權IP';
                    if (!costs[ip]) costs[ip] = { name: ip, cost: 0, hours: 0 };
                    const rate = rates[`${log.name}_${log.month}`] || 0;
                    costs[ip].cost += rate * log.hours;
                    costs[ip].hours += log.hours;
                });
                return Object.values(costs).sort((a, b) => b.cost - a.cost);
            }, [filteredLogs, filteredSalary]);

            // Phase 3: Department cost allocation
            const deptCosts = useMemo(() => {
                if (filteredSalary.length === 0) return [];
                const costs = {};
                filteredLogs.forEach(log => {
                    if (!costs[log.dept]) costs[log.dept] = { name: log.dept, cost: 0, hours: 0, members: new Set() };
                    const sal = filteredSalary.find(s => s['員工姓名'] === log.name && String(s['月份']).includes(log.month));
                    const monthHours = _.sumBy(filteredLogs.filter(l => l.name === log.name && l.month === log.month), 'hours');
                    const rate = sal && monthHours > 0 ? sal['月薪'] / monthHours : 0;
                    costs[log.dept].cost += rate * log.hours;
                    costs[log.dept].hours += log.hours;
                    costs[log.dept].members.add(log.name);
                });
                return Object.values(costs).map(d => ({
                    ...d, members: Array.from(d.members), memberCount: d.members.size,
                    avgCostPerMember: d.members.size > 0 ? (d.cost / d.members.size).toFixed(0) : 0
                })).sort((a, b) => b.cost - a.cost);
            }, [filteredLogs, filteredSalary]);

            // Get all months
            const allMonths = useMemo(() => {
                const months = _.uniq(workLogs.map(log => log.month)).sort();
                return months;
            }, [workLogs]);

            // Get all projects (ipProject/授權IP)
            const allProjects = useMemo(() => {
                return _.uniq(filteredLogs.map(l => l.ipProject || '非授權IP')).sort();
            }, [filteredLogs]);

            // Get all employees
            const allEmployees = useMemo(() => {
                return _.uniqBy(filteredLogs, 'name').map(l => l.name).sort();
            }, [filteredLogs]);

            // Get all departments
            const allDepts = useMemo(() => {
                return _.uniq(filteredLogs.map(l => l.dept)).sort();
            }, [filteredLogs]);

            // Prepare data for charts
            const projectHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'ipProject');
                return Object.entries(data)
                    .map(([name, logs]) => ({ name: name || '非授權IP', hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => b.hours - a.hours)
                    .slice(0, 10);
            }, [filteredLogs]);

            const deptHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'dept');
                return Object.entries(data)
                    .map(([name, logs]) => ({ name, hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const employeeHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'name');
                return Object.entries(data)
                    .map(([name, logs]) => ({ name, hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const monthlyHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'month');
                return Object.entries(data)
                    .map(([month, logs]) => ({ month, hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => a.month.localeCompare(b.month));
            }, [filteredLogs]);

            // Project analysis (ipProject/授權IP)
            const projectStats = useMemo(() => {
                const projects = {};
                filteredLogs.forEach(log => {
                    const ip = log.ipProject || '非授權IP';
                    if (!projects[ip]) {
                        projects[ip] = {
                            name: ip,
                            hours: 0,
                            employees: new Set(),
                            depts: new Set(),
                            workTypes: new Set()
                        };
                    }
                    projects[ip].hours += log.hours;
                    projects[ip].employees.add(log.name);
                    projects[ip].depts.add(log.dept);
                    projects[ip].workTypes.add(log.workType || log.task);
                });

                return Object.values(projects)
                    .map(p => ({
                        ...p,
                        employees: Array.from(p.employees),
                        depts: Array.from(p.depts),
                        workTypes: Array.from(p.workTypes),
                        employeeCount: p.employees.size,
                        deptCount: p.depts.size,
                        workTypeCount: p.workTypes.size
                    }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const selectedProjectData = useMemo(() => {
                if (selectedProject === 'all') {
                    return projectStats.slice(0, 20);
                }
                return projectStats.filter(p => p.name === selectedProject || (p.name === selectedProject || p.ipProject === selectedProject));
            }, [projectStats, selectedProject]);

            // Work type hours
            const workTypeHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'workType');
                return Object.entries(data)
                    .map(([name, logs]) => ({ name, hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => b.hours - a.hours)
                    .slice(0, 15);
            }, [filteredLogs]);

            // Work type stats
            const workTypeStats = useMemo(() => {
                const types = {};
                filteredLogs.forEach(log => {
                    const wt = log.workType || log.task;
                    if (!types[wt]) {
                        types[wt] = { name: wt, hours: 0, employees: new Set(), depts: new Set(), ips: new Set() };
                    }
                    types[wt].hours += log.hours;
                    types[wt].employees.add(log.name);
                    types[wt].depts.add(log.dept);
                    if (log.ipProject && log.ipProject !== '非授權IP') types[wt].ips.add(log.ipProject);
                });
                return Object.values(types)
                    .map(t => ({
                        ...t,
                        employees: Array.from(t.employees),
                        depts: Array.from(t.depts),
                        ips: Array.from(t.ips),
                        employeeCount: t.employees.size,
                        deptCount: t.depts.size,
                        ipCount: t.ips.size
                    }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const selectedWorkTypeData = useMemo(() => {
                if (selectedWorkType === 'all') return workTypeStats.slice(0, 20);
                return workTypeStats.filter(w => w.name === selectedWorkType);
            }, [workTypeStats, selectedWorkType]);

            const allWorkTypes = useMemo(() => {
                return _.uniq(filteredLogs.map(l => l.workType || l.task)).sort();
            }, [filteredLogs]);

            // Employee analysis
            const employeeStats = useMemo(() => {
                const employees = {};
                filteredLogs.forEach(log => {
                    if (!employees[log.name]) {
                        employees[log.name] = {
                            name: log.name,
                            dept: log.dept,
                            hours: 0,
                            tasks: new Set(),
                            salary: 0
                        };
                    }
                    employees[log.name].hours += log.hours;
                    employees[log.name].tasks.add(log.task);
                });

                filteredSalary.forEach(sal => {
                    if (employees[sal['員工姓名']]) {
                        employees[sal['員工姓名']].salary = sal['月薪'];
                    }
                });

                return Object.values(employees)
                    .map(e => ({
                        ...e,
                        tasks: Array.from(e.tasks),
                        taskCount: e.tasks.size,
                        hourlyRate: e.hours > 0 && e.salary > 0 ? (e.salary / e.hours).toFixed(2) : 0
                    }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs, filteredSalary]);

            const selectedEmployeeData = useMemo(() => {
                if (selectedEmployee === 'all') {
                    return employeeStats;
                }
                return employeeStats.filter(e => e.name === selectedEmployee);
            }, [employeeStats, selectedEmployee]);

            // Department analysis
            const deptStats = useMemo(() => {
                const depts = {};
                filteredLogs.forEach(log => {
                    if (!depts[log.dept]) {
                        depts[log.dept] = {
                            name: log.dept,
                            hours: 0,
                            members: new Set(),
                            tasks: new Set(),
                            cost: 0
                        };
                    }
                    depts[log.dept].hours += log.hours;
                    depts[log.dept].members.add(log.name);
                    depts[log.dept].tasks.add(log.task);
                });

                return Object.values(depts)
                    .map(d => ({
                        ...d,
                        members: Array.from(d.members),
                        tasks: Array.from(d.tasks),
                        memberCount: d.members.size,
                        taskCount: d.tasks.size,
                        avgPerMember: d.members.size > 0 ? (d.hours / d.members.size).toFixed(2) : 0
                    }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const selectedDeptData = useMemo(() => {
                if (selectedDept === 'all') {
                    return deptStats;
                }
                return deptStats.filter(d => d.name === selectedDept);
            }, [deptStats, selectedDept]);

            // Phase 4: Monthly trend by project (top 5 IPs)
            const monthlyProjectTrend = useMemo(() => {
                const top5 = projectStats.slice(0, 5).map(p => p.name);
                const months = _.uniq(filteredLogs.map(l => l.month)).sort();
                return months.map(m => {
                    const entry = { month: m };
                    top5.forEach(ip => {
                        entry[ip] = _.sumBy(filteredLogs.filter(l => (l.ipProject || '非授權IP') === ip && l.month === m), 'hours');
                    });
                    return entry;
                });
            }, [filteredLogs, projectStats]);

            // Phase 4: Monthly trend by department
            const monthlyDeptTrend = useMemo(() => {
                const depts = _.uniq(filteredLogs.map(l => l.dept));
                const months = _.uniq(filteredLogs.map(l => l.month)).sort();
                return months.map(m => {
                    const entry = { month: m };
                    depts.forEach(d => {
                        entry[d] = _.sumBy(filteredLogs.filter(l => l.dept === d && l.month === m), 'hours');
                    });
                    return entry;
                });
            }, [filteredLogs]);

            // Phase 4: Monthly trend by employee (top 5)
            const monthlyEmployeeTrend = useMemo(() => {
                const top5 = employeeStats.slice(0, 5).map(e => e.name);
                const months = _.uniq(filteredLogs.map(l => l.month)).sort();
                return months.map(m => {
                    const entry = { month: m };
                    top5.forEach(emp => {
                        entry[emp] = _.sumBy(filteredLogs.filter(l => l.name === emp && l.month === m), 'hours');
                    });
                    return entry;
                });
            }, [filteredLogs, employeeStats]);

                <div>
                    <header className="header">

                            <div className="header-subtitle">人工時管理系統</div>
                        </div>
                    </header>

                    <div className="nav-tabs">
                        {[
                            { id: 'overview', label: '總表' },
                            { id: 'projects', label: '專案分析' },
                            { id: 'workTypes', label: '工作項目分析' },
                            { id: 'employees', label: '員工分析' },
                            { id: 'departments', label: '部門分析' },
                            { id: 'settings', label: '設定' }

                                key={tab.id}
                                className={`nav-tab ${activeTab === tab.id ? 'active' : ''}`}

                            </button>

                    <div className="container">

                            </div>

                        {activeTab !== 'settings' && (

                                    <label className="toolbar-label">月份：</label>

                                        value={selectedMonth}

                                            <option key={month} value={month}>{month}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="toolbar-group">
                                    <label className="toolbar-label">起始日：</label>
                                    <input
                                        type="date"
                                        value={dateFrom}
                                        onChange={(e) => setDateFrom(e.target.value)}
                                        style={{padding:'4px 8px',borderRadius:'4px',border:'1px solid #ddd'}}
                                    />
                                </div>
                                <div className="toolbar-group">
                                    <label className="toolbar-label">截止日：</label>
                                    <input
                                        type="date"
                                        value={dateTo}
                                        onChange={(e) => setDateTo(e.target.value)}
                                        style={{padding:'4px 8px',borderRadius:'4px',border:'1px solid #ddd'}}
                                    />
                                </div>
                                {(dateFrom || dateTo) && (
                                    <button
                                        className="btn"
                                        onClick={() => { setDateFrom(''); setDateTo(''); }}

                                        清除日期
                                    </button>
                                )}
                                <button
                                    className="btn btn-primary"
                                    onClick={loadDataFromGDrive}
                                    disabled={!apiKey || !folderId || loading}
                                >
                                    {loading ? '載入中...' : '重新載入'}
                                </button>
                            </div>

                        {/* Overview Tab */}
                        {activeTab === 'overview' && (

                                        <div className="kpi-label">總工時</div>

                                        <div className="kpi-unit">小時</div>

                                        <div className="kpi-unit">個</div>

                                    <div className="kpi-card">

                                            <div className="kpi-unit">元</div>
                                        </div>
                                        <div className="kpi-card">

                                                <option key={p.name} value={p.name}>{p.name}</option>

                                {projectStats.length > 0 && (
                                    <div className="responsive-grid">

                                                <BarChart
                                                    data={selectedProjectData.slice(0, 20)}
                                                    layout="vertical"
                                                >
                                                    <CartesianGrid strokeDasharray="3 3" />
                                                    <XAxis type="number" />
                                                    <YAxis dataKey="name" type="category" width={150} />
                                                    <Tooltip />
                                                    <Bar dataKey="hours" fill="#00BCD4" />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                )}

                                {selectedProject !== 'all' && selectedProjectData.length > 0 && (
                                    <div>
                                        {selectedProjectData[0].employeeCount > 0 && (
                                            <div className="chart-container">
                                                <div className="chart-title">員工貢獻</div>
                                                <ResponsiveContainer width="100%" height={300}>
                                                    <BarChart
                                                        data={selectedProjectData[0].employees.map(emp => {
                                                            const hours = _.sumBy(
                                                                filteredLogs.filter(l =>
                                                                    (l.ipProject || '非授權IP') === selectedProject && l.name === emp
                                                                ),
                                                                'hours'
                                                            );
                                                            return { name: emp, hours };
                                                        })}
                                                    >
                                                        <CartesianGrid strokeDasharray="3 3" />
                                                        <XAxis dataKey="name" />
                                                        <YAxis />
                                                        <Tooltip />
                                                        <Bar dataKey="hours" fill="#FF6B6B" />
                                                    </BarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        )}

                                        {selectedProjectData[0].deptCount > 0 && (
                                            <div className="chart-container">
                                                <div className="chart-title">部門分佈</div>
                                                <ResponsiveContainer width="100%" height={300}>
                                                    <PieChart>
                                                        <Pie
                                                            data={selectedProjectData[0].depts.map(dept => {
                                                                const hours = _.sumBy(
                                                                    filteredLogs.filter(l =>
                                                                        (l.ipProject || '非授權IP') === selectedProject && l.dept === dept
                                                                    ),
                                                                    'hours'
                                                                );
                                                                return { name: dept, hours };
                                                            })}
                                                            dataKey="hours"
                                                            nameKey="name"
                                                            outerRadius={80}
                                                            label
                                                        >
                                                            {selectedProjectData[0].depts.map((_, index) => (
                                                                <Cell key={index} fill={COLORS[index % COLORS.length]} />
                                                            ))}
                                                        </Pie>
                                                        <Tooltip />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {projectStats.length > 0 && (
                                    <div className="table-container">
                                        <div className="chart-title">授權IP彙總</div>
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>授權IP</th>
                                                    <th>總工時</th>
                                                    <th>參與員工</th>
                                                    <th>部門數</th>
                                                    <th>工作項目數</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {projectStats.map((p, idx) => (
                                                    <tr key={idx}>
                                                        <td>{p.name}</td>
                                                        <td>{p.hours.toFixed(2)}</td>
                                                        <td>{p.employeeCount}</td>
                                                        <td>{p.deptCount}</td>
                                                        <td>{p.workTypeCount}</td>
                                                    </tr>

                                            </tbody>

                                {filteredLogs.length > 0 && (
                                    <div

                                        onClick={(e) => e.currentTarget.classList.toggle('open')}
                                    >
                                        <div className="collapsible-header">
                                            進階分析
                                            <span className="collapsible-toggle">▼</span>
                                        </div>
                                        <div className="collapsible-content">
                                            <AdvancedAnalyticsProject
                                                projectStats={projectStats}
                                                logs={filteredLogs}
                                                monthlyProjectTrend={monthlyProjectTrend}
                                            />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Work Types Tab */}
                        {activeTab === 'workTypes' && (
                            <div>
                                <div className="toolbar-group" style={{marginBottom: '16px'}}>
                                    <label className="toolbar-label">工作項目：</label>
                                    <select value={selectedWorkType} onChange={(e) => setSelectedWorkType(e.target.value)}>
                                        <option value="all">全部</option>
                                        {allWorkTypes.map(wt => (
                                            <option key={wt} value={wt}>{wt}</option>
                                        ))}
                                    </select>
                                </div>

                                {selectedWorkTypeData.length > 0 && (
                                    <div className="chart-container">
                                        <div className="chart-title">工作項目工時排行</div>
                                        <div className="table-wrapper">
                                            <table>
                                                <thead>
                                                    <tr>
                                                        <th>工作項目</th>
                                                        <th>工時</th>
                                                        <th>參與人數</th>
                                                        <th>涉及部門</th>
                                                        <th>相關授權IP</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {selectedWorkTypeData.map((wt, idx) => (
                                                        <tr key={idx}>
                                                            <td>{wt.name}</td>
                                                            <td>{wt.hours.toFixed(2)}</td>
                                                            <td>{wt.employeeCount}</td>
                                                            <td>{wt.deptCount}</td>
                                                            <td>{wt.ipCount}</td>
                                                        </tr>

                                {workTypeHours.length > 0 && (

                                        <ResponsiveContainer width="100%" height={Math.max(300, workTypeHours.length * 25)}>
                                            <BarChart data={workTypeHours} layout="vertical">
                                                <CartesianGrid strokeDasharray="3 3" />
                                                <XAxis type="number" />
                                                <YAxis dataKey="name" type="category" width={120} />
                                                <Tooltip />
                                                <Bar dataKey="hours" fill="#FF9800" />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                )}

                                {filteredLogs.length > 0 && (

                        {/* Employees Tab */}
                        {activeTab === 'employees' && (

                                <div className="toolbar">

                                    <div>

                                            <div className="responsive-grid">
                                                <div className="chart-container">
                                                    <div className="chart-title">工作分類分佈 (Top 10)</div>
                                                    <ResponsiveContainer width="100%" height={300}>
                                                        <PieChart>
                                                            <Pie

                                                                nameKey="name"

                                                            >
                                                                {_.take(selectedEmployeeData[0].tasks, 10).map((_, index) => (
