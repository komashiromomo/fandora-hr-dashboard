<body>
    <div id="root"></div>

    <script type="text/plain" id="app-script">
        const { useState, useEffect, useMemo, useCallback } = React;
        const {
            BarChart, Bar, LineChart, Line, PieChart, Pie, Cell,
            XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
            ComposedChart, Area
        } = Recharts;

        const COLORS = ['#00BCD4', '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A',
                        '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B88B'];

        // Excel parsing utilities
        const parseWorkLogExcel = (file, filename) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheetName = '明細總表';
                        if (!workbook.SheetNames.includes(sheetName)) {
                            reject(new Error(`Sheet '${sheetName}' not found`));
                            return;
                        }
                        const worksheet = workbook.Sheets[sheetName];
                        const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                        const monthMatch = filename.match(/(\d{4})年(\d{2})月/);
                        const month = monthMatch ? `${monthMatch[1]}-${monthMatch[2]}` : null;

                        const records = parseWorkLogRows(rows, month);
                        resolve(records);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        const parseWorkLogRows = (rows, defaultMonth) => {
            if (rows.length < 1) return [];

            const headers = rows[0];
            const hasHours = headers.includes('實際時數');

            const records = [];
            let currentName = null;
            let currentDept = null;
            let currentDate = null;

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;

                if (row[0]) currentName = row[0];
                if (row[1] && row[1] !== '部門') currentDept = row[1];
                if (row[2]) currentDate = row[2];

                const name = currentName;
                const dept = currentDept;
                const date = currentDate;
                const task = row[4] || (row[8] ? row[8] : '');
                const hours = parseFloat(row[headers.indexOf('實際時數')] || 0) || 0;

                if (name && date && task && hours > 0) {
                    const dateMatch = date.toString().match(/(\d{4})[\/-](\d{2})/);
                    const month = dateMatch ? `${dateMatch[1]}-${dateMatch[2]}` : defaultMonth;

                    records.push({
                        name,
                        dept: dept || '未分類',
                        date,
                        task,
                        hours,
                        month: month || defaultMonth || '2026-01'
                    });
                }
            }

            return records;
        };

        const parseSalaryExcel = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheetName = '薪資';
                        if (!workbook.SheetNames.includes(sheetName)) {
                            reject(new Error(`Sheet '${sheetName}' not found`));
                            return;
                        }
                        const worksheet = workbook.Sheets[sheetName];
                        const rows = XLSX.utils.sheet_to_json(worksheet);
                        resolve(rows);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        // Main Dashboard Component
        const FandoraDashboard = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [workLogs, setWorkLogs] = useState([]);
            const [salaryData, setSalaryData] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState('all');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState(null);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gdrive_api_key') || '');
            const [folderId, setFolderId] = useState(localStorage.getItem('gdrive_folder_id') || '');
            const [salaryFolderId, setSalaryFolderId] = useState(localStorage.getItem('gdrive_salary_folder_id') || '');
            const [testingConnection, setTestingConnection] = useState(false);
            const [selectedProject, setSelectedProject] = useState('all');
            const [selectedEmployee, setSelectedEmployee] = useState('all');
            const [selectedDept, setSelectedDept] = useState('all');

            // Auto-load data on mount
            useEffect(() => {
                if (apiKey && folderId) {
                    loadDataFromGDrive();
                }
            }, []);

            const loadDataFromGDrive = useCallback(async () => {
                setLoading(true);
                setMessage(null);
                try {
                    const workLogsData = await fetchFilesFromGDrive(folderId, 'work');
                    const salariesData = await fetchFilesFromGDrive(salaryFolderId || folderId, 'salary');
                    setWorkLogs(workLogsData);
                    setSalaryData(salariesData);
                    setMessage({ type: 'success', text: '数据加载成功' });
                } catch (error) {
                    setMessage({ type: 'error', text: `加载失败: ${error.message}` });
                }
                setLoading(false);
            }, [apiKey, folderId, salaryFolderId]);

            const listFolderFiles = async (fId) => {
                const allFiles = [];
                let pageToken = '';
                do {
                    const q = encodeURIComponent(`'${fId}' in parents and trashed=false`);
                    let url = `https://www.googleapis.com/drive/v3/files?q=${q}&key=${apiKey}&fields=nextPageToken,files(id,name,mimeType,modifiedTime)&pageSize=100`;
                    if (pageToken) url += `&pageToken=${pageToken}`;
                    const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
                    if (!resp.ok) throw new Error(`Google Drive API error: ${resp.statusText}`);
                    const json = await resp.json();
                    allFiles.push(...(json.files || []));
                    pageToken = json.nextPageToken || '';
                } while (pageToken);
                return allFiles;
            };

            const collectXlsxFiles = async (fId, depth = 0) => {
                if (depth > 5) return [];
                const items = await listFolderFiles(fId);
                let xlsxFiles = items.filter(f => f.name.toLowerCase().endsWith('.xlsx'));
                const subFolders = items.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
                for (const folder of subFolders) {
                    const subFiles = await collectXlsxFiles(folder.id, depth + 1);
                    xlsxFiles = xlsxFiles.concat(subFiles);
                }
                return xlsxFiles;
            };

            const fetchFilesFromGDrive = async (folderIdToUse, fileType) => {
                setMessage({ type: 'info', text: '正在掃描資料夾結構，請稍候...' });
                const files = await collectXlsxFiles(folderIdToUse);
                setMessage({ type: 'info', text: `找到 ${files.length} 個 Excel 檔案，正在載入...` });
                const data = [];

                for (const file of files) {
                    try {
                        const fileResponse = await fetch(
                            `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${apiKey}`
                        );
                        const arrayBuffer = await fileResponse.arrayBuffer();

                        if (fileType === 'work') {
                            const mockFile = new File([arrayBuffer], file.name);
                            const records = await parseWorkLogExcel(mockFile, file.name);
                            data.push(...records);
                        } else if (fileType === 'salary') {
                            const mockFile = new File([arrayBuffer], file.name);
                            const records = await parseSalaryExcel(mockFile);
                            data.push(...records);
                        }
                    } catch (error) {
                        console.error(`Failed to parse ${file.name}:`, error);
                    }
                }
                return data;
            };

            const handleSaveSettings = () => {
                localStorage.setItem('gdrive_api_key', apiKey);
                localStorage.setItem('gdrive_folder_id', folderId);
                localStorage.setItem('gdrive_salary_folder_id', salaryFolderId);
                setMessage({ type: 'success', text: '设置已保存' });
            };

            const handleTestConnection = async () => {
                if (!apiKey || !folderId) {
                    setMessage({ type: 'error', text: '请填写 API Key 和文件夹 ID' });
                    return;
                }

                setTestingConnection(true);
                try {
                    const query = encodeURIComponent(`'${folderId}' in parents and trashed=false`);
                    const response = await fetch(
                        `https://www.googleapis.com/drive/v3/files?q=${query}&key=${apiKey}&fields=files(id,name)&pageSize=1`,
                        { headers: { 'Accept': 'application/json' } }
                    );

                    if (response.ok) {
                        setMessage({ type: 'success', text: '连接成功！可以加载数据' });
                    } else {
                        setMessage({ type: 'error', text: '连接失败，请检查 API Key 和文件夹 ID' });
                    }
                } catch (error) {
                    setMessage({ type: 'error', text: `连接测试失败: ${error.message}` });
                }
                setTestingConnection(false);
            };

            const handleWorkLogUpload = (files) => {
                const tasks = Array.from(files).map(file => parseWorkLogExcel(file, file.name));
                Promise.all(tasks)
                    .then(results => {
                        const allLogs = results.flat();
                        setWorkLogs([...workLogs, ...allLogs]);
                        setMessage({ type: 'success', text: `成功导入 ${allLogs.length} 条工作记录` });
                    })
                    .catch(error => {
                        setMessage({ type: 'error', text: `导入失败: ${error.message}` });
                    });
            };

            const handleSalaryUpload = (files) => {
                const tasks = Array.from(files).map(file => parseSalaryExcel(file));
                Promise.all(tasks)
                    .then(results => {
                        const allSalaries = results.flat();
                        setSalaryData([...salaryData, ...allSalaries]);
                        setMessage({ type: 'success', text: `成功导入 ${allSalaries.length} 条薪资记录` });
                    })
                    .catch(error => {
                        setMessage({ type: 'error', text: `导入失败: ${error.message}` });
                    });
            };

            // Filter data based on selected month
            const filteredLogs = useMemo(() => {
                if (selectedMonth === 'all') return workLogs;
                return workLogs.filter(log => log.month === selectedMonth);
            }, [workLogs, selectedMonth]);

            const filteredSalary = useMemo(() => {
                if (selectedMonth === 'all') return salaryData;
                return salaryData.filter(rec => {
                    const recordMonth = typeof rec['月份'] === 'string' ? rec['月份'] : `${rec['月份']}-01`;
                    return recordMonth.startsWith(selectedMonth);
                });
            }, [salaryData, selectedMonth]);

            // Calculate KPIs
            const kpis = useMemo(() => {
                const uniqueEmployees = _.uniqBy(filteredLogs, 'name').length;
                const uniqueProjects = _.uniq(filteredLogs.map(l => l.task)).length;
                const totalHours = _.sumBy(filteredLogs, 'hours');
                const avgHours = uniqueEmployees > 0 ? (totalHours / uniqueEmployees).toFixed(2) : 0;

                let totalCost = 0;
                let avgHourlyRate = 0;

                if (filteredSalary.length > 0) {
                    filteredLogs.forEach(log => {
                        const salary = filteredSalary.find(s =>
                            s['員工姓名'] === log.name &&
                            s['月份'].includes(log.month)
                        );
                        if (salary) {
                            const monthlyHours = _.sumBy(
                                filteredLogs.filter(l => l.name === log.name && l.month === log.month),
                                'hours'
                            );
                            const hourlyRate = monthlyHours > 0 ? salary['月薪'] / monthlyHours : 0;
                            totalCost += hourlyRate * log.hours;
                        }
                    });
                    const totalWorked = filteredLogs.length > 0 ? totalHours : 1;
                    avgHourlyRate = (totalCost / totalWorked).toFixed(2);
                }

                return {
                    totalHours: totalHours.toFixed(2),
                    uniqueEmployees,
                    uniqueProjects,
                    avgHours,
                    totalCost: totalCost.toFixed(2),
                    avgHourlyRate
                };
            }, [filteredLogs, filteredSalary]);

            // Get all months
            const allMonths = useMemo(() => {
                const months = _.uniq(workLogs.map(log => log.month)).sort();
                return months;
            }, [workLogs]);

            // Get all projects
            const allProjects = useMemo(() => {
                return _.uniq(filteredLogs.map(l => l.task)).sort();
            }, [filteredLogs]);

            // Get all employees
            const allEmployees = useMemo(() => {
                return _.uniqBy(filteredLogs, 'name').map(l => l.name).sort();
            }, [filteredLogs]);

            // Get all departments
            const allDepts = useMemo(() => {
                return _.uniq(filteredLogs.map(l => l.dept)).sort();
            }, [filteredLogs]);

            // Prepare data for charts
            const projectHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'task');
                return Object.entries(data)
                    .map(([name, logs]) => ({ name, hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => b.hours - a.hours)
                    .slice(0, 10);
            }, [filteredLogs]);

            const deptHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'dept');
                return Object.entries(data)
                    .map(([name, logs]) => ({ name, hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const employeeHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'name');
                return Object.entries(data)
                    .map(([name, logs]) => ({ name, hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const monthlyHours = useMemo(() => {
                const data = _.groupBy(filteredLogs, 'month');
                return Object.entries(data)
                    .map(([month, logs]) => ({ month, hours: _.sumBy(logs, 'hours') }))
                    .sort((a, b) => a.month.localeCompare(b.month));
            }, [filteredLogs]);

            // Project analysis
            const projectStats = useMemo(() => {
                const projects = {};
                filteredLogs.forEach(log => {
                    if (!projects[log.task]) {
                        projects[log.task] = {
                            name: log.task,
                            hours: 0,
                            employees: new Set(),
                            depts: new Set()
                        };
                    }
                    projects[log.task].hours += log.hours;
                    projects[log.task].employees.add(log.name);
                    projects[log.task].depts.add(log.dept);
                });

                return Object.values(projects)
                    .map(p => ({
                        ...p,
                        employees: Array.from(p.employees),
                        depts: Array.from(p.depts),
                        employeeCount: p.employees.size,
                        deptCount: p.depts.size
                    }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const selectedProjectData = useMemo(() => {
                if (selectedProject === 'all') {
                    return projectStats.slice(0, 20);
                }
                return projectStats.filter(p => p.name === selectedProject);
            }, [projectStats, selectedProject]);

            // Employee analysis
            const employeeStats = useMemo(() => {
                const employees = {};
                filteredLogs.forEach(log => {
                    if (!employees[log.name]) {
                        employees[log.name] = {
                            name: log.name,
                            dept: log.dept,
                            hours: 0,
                            tasks: new Set(),
                            salary: 0
                        };
                    }
                    employees[log.name].hours += log.hours;
                    employees[log.name].tasks.add(log.task);
                });

                filteredSalary.forEach(sal => {
                    if (employees[sal['員工姓名']]) {
                        employees[sal['員工姓名']].salary = sal['月薪'];
                    }
                });

                return Object.values(employees)
                    .map(e => ({
                        ...e,
                        tasks: Array.from(e.tasks),
                        taskCount: e.tasks.size,
                        hourlyRate: e.hours > 0 && e.salary > 0 ? (e.salary / e.hours).toFixed(2) : 0
                    }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs, filteredSalary]);

            const selectedEmployeeData = useMemo(() => {
                if (selectedEmployee === 'all') {
                    return employeeStats;
                }
                return employeeStats.filter(e => e.name === selectedEmployee);
            }, [employeeStats, selectedEmployee]);

            // Department analysis
            const deptStats = useMemo(() => {
                const depts = {};
                filteredLogs.forEach(log => {
                    if (!depts[log.dept]) {
                        depts[log.dept] = {
                            name: log.dept,
                            hours: 0,
                            members: new Set(),
                            tasks: new Set(),
                            cost: 0
                        };
                    }
                    depts[log.dept].hours += log.hours;
                    depts[log.dept].members.add(log.name);
                    depts[log.dept].tasks.add(log.task);
                });

                return Object.values(depts)
                    .map(d => ({
                        ...d,
                        members: Array.from(d.members),
                        tasks: Array.from(d.tasks),
                        memberCount: d.members.size,
                        taskCount: d.tasks.size,
                        avgPerMember: d.members.size > 0 ? (d.hours / d.members.size).toFixed(2) : 0
                    }))
                    .sort((a, b) => b.hours - a.hours);
            }, [filteredLogs]);

            const selectedDeptData = useMemo(() => {
                if (selectedDept === 'all') {
                    return deptStats;
                }
                return deptStats.filter(d => d.name === selectedDept);
            }, [deptStats, selectedDept]);

            return (
                <div>
                    <header className="header">
                        <div className="header-content">
                            <div className="header-title">Fandora</div>
                            <div className="header-subtitle">人工時管理系統</div>
                        </div>
                    </header>

                    <div className="nav-tabs">
                        {[
                            { id: 'overview', label: '總表' },
                            { id: 'projects', label: '專案分析' },
                            { id: 'employees', label: '員工分析' },
                            { id: 'departments', label: '部門分析' },
                            { id: 'settings', label: '設定' }
                        ].map(tab => (
                            <button
                                key={tab.id}
                                className={`nav-tab ${activeTab === tab.id ? 'active' : ''}`}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>

                    <div className="container">
                        {message && (
                            <div className={`alert alert-${message.type}`}>
                                {message.text}
                            </div>
                        )}

                        {activeTab !== 'settings' && (
                            <div className="toolbar">
                                <div className="toolbar-group">
                                    <label className="toolbar-label">時間段：</label>
                                    <select
                                        value={selectedMonth}
                                        onChange={(e) => setSelectedMonth(e.target.value)}
                                    >
                                        <option value="all">全部</option>
                                        {allMonths.map(month => (
                                            <option key={month} value={month}>{month}</option>
                                        ))}
                                    </select>
                                </div>
                                <button
                                    className="btn btn-primary"
                                    onClick={loadDataFromGDrive}
                                    disabled={!apiKey || !folderId || loading}
                                >
                                    {loading ? '載入中...' : '重新載入'}
                                </button>
                            </div>
                        )}

                        {/* Overview Tab */}
                        {activeTab === 'overview' && (
                            <div>
                                <div className="kpi-grid">
                                    <div className="kpi-card">
                                        <div className="kpi-label">總工時</div>
                                        <div className="kpi-value">{kpis.totalHours}</div>
                                        <div className="kpi-unit">小時</div>
                                    </div>
                                    <div className="kpi-card">
                                        <div className="kpi-label">員工人數</div>
                                        <div className="kpi-value">{kpis.uniqueEmployees}</div>
                                        <div className="kpi-unit">人</div>
                                    </div>
                                    <div className="kpi-card">
                                        <div className="kpi-label">專案數量</div>
                                        <div className="kpi-value">{kpis.uniqueProjects}</div>
                                        <div className="kpi-unit">個</div>
                                    </div>
                                    <div className="kpi-card">
                                        <div className="kpi-label">平均每人工時</div>
                                        <div className="kpi-value">{kpis.avgHours}</div>
                                        <div className="kpi-unit">小時</div>
                                    </div>
                                </div>

                                {filteredSalary.length > 0 && (
                                    <div className="kpi-grid">
                                        <div className="kpi-card">
                                            <div className="kpi-label">總管理費用</div>
                                            <div className="kpi-value">¥{kpis.totalCost}</div>
                                            <div className="kpi-unit">元</div>
                                        </div>
                                        <div className="kpi-card">
                                            <div className="kpi-label">平均時薪成本</div>
                                            <div className="kpi-value">¥{kpis.avgHourlyRate}</div>
                                            <div className="kpi-unit">元/小時</div>
                                        </div>
                                    </div>
                                )}

                                {monthlyHours.length > 0 && (
                                    <div className="chart-container">
                                        <div className="chart-title">月度工時對比</div>
                                        <ResponsiveContainer width="100%" height={300}>
                                            <BarChart data={monthlyHours}>
                                                <CartesianGrid strokeDasharray="3 3" />
                                                <XAxis dataKey="month" />
                                                <YAxis />
                                                <Tooltip />
                                                <Bar dataKey="hours" fill="#00BCD4" />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                )}

                                {projectHours.length > 0 && (
                                    <div className="responsive-grid">
                                        <div className="chart-container">
                                            <div className="chart-title">Top 10 工作分類</div>
                                            <ResponsiveContainer width="100%" height={300}>
                                                <PieChart>
                                                    <Pie
                                                        data={projectHours}
                                                        dataKey="hours"
                                                        nameKey="name"
                                                        outerRadius={80}
                                                        label
                                                    >
                                                        {projectHours.map((_, index) => (
                                                            <Cell key={index} fill={COLORS[index % COLORS.length]} />
                                                        ))}
                                                    </Pie>
                                                    <Tooltip />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>

                                        <div className="chart-container">
                                            <div className="chart-title">部門工時分佈</div>
                                            <ResponsiveContainer width="100%" height={300}>
                                                <BarChart
                                                    data={deptHours}
                                                    layout="vertical"
                                                >
                                                    <CartesianGrid strokeDasharray="3 3" />
                                                    <XAxis type="number" />
                                                    <YAxis dataKey="name" type="category" width={80} />
                                                    <Tooltip />
                                                    <Bar dataKey="hours" fill="#00BCD4" />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                )}

                                {employeeHours.length > 0 && (
                                    <div className="chart-container">
                                        <div className="chart-title">員工工時排行</div>
                                        <ResponsiveContainer width="100%" height={Math.max(200, employeeHours.length * 20)}>
                                            <BarChart
                                                data={employeeHours}
                                                layout="vertical"
                                            >
                                                <CartesianGrid strokeDasharray="3 3" />
                                                <XAxis type="number" />
                                                <YAxis dataKey="name" type="category" width={100} />
                                                <Tooltip />
                                                <Bar dataKey="hours" fill="#00BCD4" />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                )}

                                {filteredLogs.length > 0 && (
                                    <div
                                        className="collapsible"
                                        onClick={(e) => e.currentTarget.classList.toggle('open')}
                                    >
                                        <div className="collapsible-header">
                                            進階分析
                                            <span className="collapsible-toggle">▼</span>
                                        </div>
                                        <div className="collapsible-content">
                                            <AdvancedAnalyticsOverview
                                                logs={filteredLogs}
                                                salary={filteredSalary}
                                                projectStats={projectStats}
                                                employeeStats={employeeStats}
                                            />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Projects Tab */}
                        {activeTab === 'projects' && (
                            <div>
                                <div className="toolbar">
                                    <div className="toolbar-group">
                                        <label className="toolbar-label">專案：</label>
                                        <select
                                            value={selectedProject}
                                            onChange={(e) => setSelectedProject(e.target.value)}
                                        >
                                            <option value="all">全部</option>
                                            {projectStats.map(p => (
                                                <option key={p.name} value={p.name}>{p.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>

                                {projectStats.length > 0 && (
                                    <div className="responsive-grid">
                                        <div className="chart-container">
                                            <div className="chart-title">
                                                {selectedProject === 'all' ? 'Top 20 專案工時' : selectedProject}
                                            </div>
                                            <ResponsiveContainer width="100%" height={400}>
                                                <BarChart
                                                    data={selectedProjectData.slice(0, 20)}
                                                    layout="vertical"
                                                >
                                                    <CartesianGrid strokeDasharray="3 3" />
                                                    <XAxis type="number" />
                                                    <YAxis dataKey="name" type="category" width={150} />
                                                    <Tooltip />
                                                    <Bar dataKey="hours" fill="#00BCD4" />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                )}

                                {selectedProject !== 'all' && selectedProjectData.length > 0 && (
                                    <div>
                                        {selectedProjectData[0].employeeCount > 0 && (
                                            <div className="chart-container">
                                                <div className="chart-title">員工貢獻</div>
                                                <ResponsiveContainer width="100%" height={300}>
                                                    <BarChart
                                                        data={selectedProjectData[0].employees.map(emp => {
                                                            const hours = _.sumBy(
                                                                filteredLogs.filter(l =>
                                                                    l.task === selectedProject && l.name === emp
                                                                ),
                                                                'hours'
                                                            );
                                                            return { name: emp, hours };
                                                        })}
                                                    >
                                                        <CartesianGrid strokeDasharray="3 3" />
                                                        <XAxis dataKey="name" />
                                                        <YAxis />
                                                        <Tooltip />
                                                        <Bar dataKey="hours" fill="#FF6B6B" />
                                                    </BarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        )}

                                        {selectedProjectData[0].deptCount > 0 && (
                                            <div className="chart-container">
                                                <div className="chart-title">部門分佈</div>
                                                <ResponsiveContainer width="100%" height={300}>
                                                    <PieChart>
                                                        <Pie
                                                            data={selectedProjectData[0].depts.map(dept => {
                                                                const hours = _.sumBy(
                                                                    filteredLogs.filter(l =>
                                                                        l.task === selectedProject && l.dept === dept
                                                                    ),
                                                                    'hours'
                                                                );
                                                                return { name: dept, hours };
                                                            })}
                                                            dataKey="hours"
                                                            nameKey="name"
                                                            outerRadius={80}
                                                            label
                                                        >
                                                            {selectedProjectData[0].depts.map((_, index) => (
                                                                <Cell key={index} fill={COLORS[index % COLORS.length]} />
                                                            ))}
                                                        </Pie>
                                                        <Tooltip />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {projectStats.length > 0 && (
                                    <div className="table-container">
                                        <div className="chart-title">專案彙總</div>
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>專案名稱</th>
                                                    <th>總工時</th>
                                                    <th>參與員工</th>
                                                    <th>部門數</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {projectStats.map((p, idx) => (
                                                    <tr key={idx}>
                                                        <td>{p.name}</td>
                                                        <td>{p.hours.toFixed(2)}</td>
                                                        <td>{p.employeeCount}</td>
                                                        <td>{p.deptCount}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {filteredLogs.length > 0 && (
                                    <div
                                        className="collapsible"
                                        onClick={(e) => e.currentTarget.classList.toggle('open')}
                                    >
                                        <div className="collapsible-header">
                                            進階分析
                                            <span className="collapsible-toggle">▼</span>
                                        </div>
                                        <div className="collapsible-content">
                                            <AdvancedAnalyticsProject
                                                projectStats={projectStats}
                                                logs={filteredLogs}
                                            />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Employees Tab */}
                        {activeTab === 'employees' && (
                            <div>
                                <div className="toolbar">
                                    <div className="toolbar-group">
                                        <label className="toolbar-label">員工：</label>
                                        <select
                                            value={selectedEmployee}
                                            onChange={(e) => setSelectedEmployee(e.target.value)}
                                        >
                                            <option value="all">全部</option>
                                            {allEmployees.map(emp => (
                                                <option key={emp} value={emp}>{emp}</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>

                                {selectedEmployee !== 'all' && selectedEmployeeData.length > 0 && (
                                    <div>
                                        {selectedEmployeeData[0].tasks.length > 0 && (
                                            <div className="responsive-grid">
                                                <div className="chart-container">
                                                    <div className="chart-title">工作分類分佈 (Top 10)</div>
                                                    <ResponsiveContainer width="100%" height={300}>
                                                        <PieChart>
                                                            <Pie
                                                                data={_.take(
                                                                    selectedEmployeeData[0].tasks.map(task => ({
                                                                        name: task,
                                                                        hours: _.sumBy(
                                                                            filteredLogs.filter(l =>
                                                                                l.name === selectedEmployee && l.task === task
                                                                            ),
                                                                            'hours'
                                                                        )
                                                                    }))
                                                                        .sort((a, b) => b.hours - a.hours),
                                                                    10
                                                                )}
                                                                dataKey="hours"
                                                                nameKey="name"
                                                                outerRadius={80}
                                                                label
                                                            >
                                                                {_.take(selectedEmployeeData[0].tasks, 10).map((_, index) => (
                                                                    <Cell key={index} fill={COLORS[index % COLORS.length]} />
                                                                ))}
                                                            </Pie>
                                                            <Tooltip />
                                                        </PieChart>
                                                    </ResponsiveContainer>
                                                </div>
                                            </div>
                                        )}

                                        <div className="table-container">
                                            <div className="chart-title">詳細信息</div>
                                            <table>
                                                <tbody>
                                                    <tr>
                                                        <td><strong>姓名</strong></td>
                                                        <td>{selectedEmployeeData[0].name}</td>
                                                    </tr>
                                                    <tr>
                                                        <td><strong>部門</strong></td>
                                                        <td>{selectedEmployeeData[0].dept}</td>
                                                    </tr>
                                                    <tr>
                                                        <td><strong>總工時</strong></td>
                                                        <td>{selectedEmployeeData[0].hours.toFixed(2)}</td>
                                                    </tr>
                                                    <tr>
                                                        <td><strong>工作分類數</strong></td>
                                                        <td>{selectedEmployeeData[0].taskCount}</td>
                                                    </tr>
                                                    {selectedEmployeeData[0].hourlyRate > 0 && (
                                                        <tr>
                                                            <td><strong>時薪</strong></td>
                                                            <td>¥{selectedEmployeeData[0].hourlyRate}/小時</td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {selectedEmployee === 'all' && employeeStats.length > 0 && (
                                    <div>
                                        <div className="chart-container">
                                            <div className="chart-title">員工工時排行</div>
                                            <ResponsiveContainer width="100%" height={Math.max(300, employeeStats.length * 20)}>
                                                <BarChart
                                                    data={employeeStats}
                                                    layout="vertical"
                                                >
                                                    <CartesianGrid strokeDasharray="3 3" />
                                                    <XAxis type="number" />
                                                    <YAxis dataKey="name" type="category" width={100} />
                                                    <Tooltip />
                                                    <Bar dataKey="hours" fill="#00BCD4" />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>

                                        <div className="table-container">
                                            <div className="chart-title">員工列表</div>
                                            <table>
                                                <thead>
                                                    <tr>
                                                        <th>姓名</th>
                                                        <th>部門</th>
                                                        <th>工時</th>
                                                        <th>工作類型數</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {employeeStats.map((emp, idx) => (
                                                        <tr key={idx}>
                                                            <td>{emp.name}</td>
                                                            <td>{emp.dept}</td>
                                                            <td>{emp.hours.toFixed(2)}</td>
                                                            <td>{emp.taskCount}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {filteredLogs.length > 0 && (
                                    <div
                                        className="collapsible"
                                        onClick={(e) => e.currentTarget.classList.toggle('open')}
                                    >
                                        <div className="collapsible-header">
                                            進階分析
                                            <span className="collapsible-toggle">▼</span>
                                        </div>
                                        <div className="collapsible-content">
                                            <AdvancedAnalyticsEmployee
                                                employeeStats={employeeStats}
                                                logs={filteredLogs}
                                            />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Departments Tab */}
                        {activeTab === 'departments' && (
                            <div>
                                <div className="toolbar">
                                    <div className="toolbar-group">
                                        <label className="toolbar-label">部門：</label>
                                        <select
                                            value={selectedDept}
                                            onChange={(e) => setSelectedDept(e.target.value)}
                                        >
                                            <option value="all">全部</option>
                                            {allDepts.map(dept => (
                                                <option key={dept} value={dept}>{dept}</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>

                                {deptStats.length > 0 && (
                                    <div>
                                        <div className="chart-container">
                                            <div className="chart-title">部門工時分佈</div>
                                            <ResponsiveContainer width="100%" height={300}>
                                                <BarChart data={deptStats}>
                                                    <CartesianGrid strokeDasharray="3 3" />
                                                    <XAxis dataKey="name" />
                                                    <YAxis />
                                                    <Tooltip />
                                                    <Bar dataKey="hours" fill="#00BCD4" />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>

                                        {selectedDept !== 'all' && selectedDeptData.length > 0 && (
                                            <div className="responsive-grid">
                                                {selectedDeptData[0].memberCount > 0 && (
                                                    <div className="chart-container">
                                                        <div className="chart-title">成員工時分佈</div>
                                                        <ResponsiveContainer width="100%" height={300}>
                                                            <BarChart
                                                                data={selectedDeptData[0].members.map(member => ({
                                                                    name: member,
                                                                    hours: _.sumBy(
                                                                        filteredLogs.filter(l =>
                                                                            l.dept === selectedDept && l.name === member
                                                                        ),
                                                                        'hours'
                                                                    )
                                                                }))}
                                                            >
                                                                <CartesianGrid strokeDasharray="3 3" />
                                                                <XAxis dataKey="name" />
                                                                <YAxis />
                                                                <Tooltip />
                                                                <Bar dataKey="hours" fill="#FF6B6B" />
                                                            </BarChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                )}

                                                {selectedDeptData[0].taskCount > 0 && (
                                                    <div className="chart-container">
                                                        <div className="chart-title">工作分類分佈</div>
                                                        <ResponsiveContainer width="100%" height={300}>
                                                            <PieChart>
                                                                <Pie
                                                                    data={_.take(
                                                                        selectedDeptData[0].tasks.map(task => ({
                                                                            name: task,
                                                                            hours: _.sumBy(
                                                                                filteredLogs.filter(l =>
                                                                                    l.dept === selectedDept && l.task === task
                                                                                ),
                                                                                'hours'
                                                                            )
                                                                        }))
                                                                            .sort((a, b) => b.hours - a.hours),
                                                                        10
                                                                    )}
                                                                    dataKey="hours"
                                                                    nameKey="name"
                                                                    outerRadius={80}
                                                                    label
                                                                >
                                                                    {_.take(selectedDeptData[0].tasks, 10).map((_, index) => (
                                                                        <Cell key={index} fill={COLORS[index % COLORS.length]} />
                                                                    ))}
                                                                </Pie>
                                                                <Tooltip />
                                                            </PieChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <div className="table-container">
                                            <div className="chart-title">部門統計</div>
                                            <table>
                                                <thead>
                                                    <tr>
                                                        <th>部門</th>
                                                        <th>總工時</th>
                                                        <th>成員數</th>
                                                        <th>平均工時</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {deptStats.map((d, idx) => (
                                                        <tr key={idx}>
                                                            <td>{d.name}</td>
                                                            <td>{d.hours.toFixed(2)}</td>
                                                            <td>{d.memberCount}</td>
                                                            <td>{d.avgPerMember}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {filteredLogs.length > 0 && (
                                    <div
                                        className="collapsible"
                                        onClick={(e) => e.currentTarget.classList.toggle('open')}
                                    >
                                        <div className="collapsible-header">
                                            進階分析
                                            <span className="collapsible-toggle">▼</span>
                                        </div>
                                        <div className="collapsible-content">
                                            <AdvancedAnalyticsDepartment
                                                deptStats={deptStats}
                                                logs={filteredLogs}
                                            />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Settings Tab */}
                        {activeTab === 'settings' && (
                            <div className="chart-container">
                                <div className="chart-title">Google Drive 設定</div>
                                <div className="settings-form">
                                    <div className="form-group">
                                        <label>Google Drive API Key</label>
                                        <input
                                            type="password"
                                            value={apiKey}
                                            onChange={(e) => setApiKey(e.target.value)}
                                            placeholder="輸入您的 API Key"
                                        />
                                        <div className="help-text">
                                            <a href="https://console.cloud.google.com/" target="_blank" rel="noopener noreferrer">
                                                從 Google Cloud Console 獲取 API Key
                                            </a>
                                        </div>
                                    </div>

                                    <div className="form-group">
                                        <label>工時日誌資料夾 ID</label>
                                        <input
                                            type="text"
                                            value={folderId}
                                            onChange={(e) => setFolderId(e.target.value)}
                                            placeholder="輸入資料夾 ID"
                                        />
                                        <div className="help-text">
                                            資料夾 ID 可從 Google Drive 的分享連結中取得
                                        </div>
                                    </div>

                                    <div className="form-group">
                                        <label>薪資資料夾 ID (可選)</label>
                                        <input
                                            type="text"
                                            value={salaryFolderId}
                                            onChange={(e) => setSalaryFolderId(e.target.value)}
                                            placeholder="輸入資料夾 ID，或留空以使用同一資料夾"
                                        />
                                        <div className="help-text">
                                            如果薪資檔案與工時日誌在同一資料夾，可以留空
                                        </div>
                                    </div>

                                    <div className="toolbar">
                                        <button
                                            className="btn btn-primary"
                                            onClick={handleSaveSettings}
                                        >
                                            保存設定
                                        </button>
                                        <button
                                            className="btn btn-secondary"
                                            onClick={handleTestConnection}
                                            disabled={testingConnection}
                                        >
                                            {testingConnection ? '測試中...' : '測試連線'}
                                        </button>
                                        <button
                                            className="btn btn-primary"
                                            onClick={loadDataFromGDrive}
                                            disabled={!apiKey || !folderId || loading}
                                        >
                                            {loading ? '載入中...' : '現在載入數據'}
                                        </button>
                                    </div>
                                </div>

                                <div className="chart-title" style={{ marginTop: '40px' }}>
                                    手動上傳
                                </div>

                                <div className="form-group">
                                    <label>上傳工時日誌 (Excel)</label>
                                    <DragDropUpload onFiles={handleWorkLogUpload} accept=".xlsx" />
                                    {workLogs.length > 0 && (
                                        <div className="file-list">
                                            <div className="file-item">
                                                已加載 {workLogs.length} 條工作記錄
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="form-group">
                                    <label>上傳薪資資料 (Excel)</label>
                                    <DragDropUpload onFiles={handleSalaryUpload} accept=".xlsx" />
                                    {salaryData.length > 0 && (
                                        <div className="file-list">
                                            <div className="file-item">
                                                已加載 {salaryData.length} 條薪資記錄
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="toolbar">
                                    <button
                                        className="btn btn-danger"
                                        onClick={() => {
                                            if (window.confirm('確定要清除所有數據嗎?')) {
                                                setWorkLogs([]);
                                                setSalaryData([]);
                                                setMessage({ type: 'success', text: '數據已清除' });
                                            }
                                        }}
                                    >
                                        清除所有數據
                                    </button>
                                </div>
                            </div>
                        )}

                        {filteredLogs.length === 0 && activeTab !== 'settings' && (
                            <div className="empty-state">
                                <h3>暫無數據</h3>
                                <p>請先在「設定」頁籤配置 Google Drive 或上傳 Excel 檔案</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Drag & Drop Upload Component
        const DragDropUpload = ({ onFiles, accept }) => {
            const [dragover, setDragover] = useState(false);

            const handleDragover = (e) => {
                e.preventDefault();
                setDragover(true);
            };

            const handleDragleave = () => {
                setDragover(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragover(false);
                const files = e.dataTransfer.files;
                if (files) onFiles(files);
            };

            const handleInputChange = (e) => {
                if (e.target.files) onFiles(e.target.files);
            };

            return (
                <div
                    className={`upload-area ${dragover ? 'dragover' : ''}`}
                    onDragover={handleDragover}
                    onDragleave={handleDragleave}
                    onDrop={handleDrop}
                    onClick={() => document.getElementById(`file-input-${accept}`).click()}
                >
                    <div style={{ fontSize: '24px', marginBottom: '8px' }}>📁</div>
                    <div style={{ fontWeight: '600' }}>拖放 Excel 檔案或點擊選擇</div>
                    <div style={{ fontSize: '12px', color: '#999', marginTop: '4px' }}>
                        支援格式: {accept}
                    </div>
                    <input
                        id={`file-input-${accept}`}
                        type="file"
                        multiple
                        accept={accept}
                        onChange={handleInputChange}
                        style={{ display: 'none' }}
                    />
                </div>
            );
        };

        // Advanced Analytics Components
        const AdvancedAnalyticsOverview = ({ logs, salary, projectStats, employeeStats }) => {
            const insights = useMemo(() => {
                const insights = [];

                // Highest workload project
                if (projectStats.length > 0) {
                    insights.push(
                        `最忙碌的專案: ${projectStats[0].name} (${projectStats[0].hours.toFixed(2)} 小時)`
                    );
                }

                // Most versatile employee
                const mostVersatile = _.maxBy(employeeStats, 'taskCount');
                if (mostVersatile) {
                    insights.push(
                        `最多才多藝的員工: ${mostVersatile.name} (${mostVersatile.taskCount} 種工作)`
                    );
                }

                // Hardest working employee
                const hardestWorking = _.maxBy(employeeStats, 'hours');
                if (hardestWorking) {
                    insights.push(
                        `工時最長的員工: ${hardestWorking.name} (${hardestWorking.hours.toFixed(2)} 小時)`
                    );
                }

                return insights;
            }, [projectStats, employeeStats]);

            return (
                <div>
                    <div className="chart-title">關鍵洞察</div>
                    {insights.map((insight, idx) => (
                        <div key={idx} className="insight-item">
                            {insight}
                        </div>
                    ))}
                </div>
            );
        };

        const AdvancedAnalyticsProject = ({ projectStats, logs }) => {
            const insights = useMemo(() => {
                if (projectStats.length === 0) return [];

                const insights = [];
                const highestCost = _.maxBy(projectStats, p => {
                    return _.sumBy(logs.filter(l => l.task === p.name), 'hours');
                });

                if (highestCost) {
                    insights.push(`最高成本的專案: ${highestCost.name}`);
                }

                const mostTeamMembers = _.maxBy(projectStats, 'employeeCount');
                if (mostTeamMembers) {
                    insights.push(`參與人數最多的專案: ${mostTeamMembers.name} (${mostTeamMembers.employeeCount} 人)`);
                }

                return insights;
            }, [projectStats, logs]);

            return (
                <div>
                    <div className="chart-title">專案洞察</div>
                    {insights.map((insight, idx) => (
                        <div key={idx} className="insight-item">
                            {insight}
                        </div>
                    ))}
                </div>
            );
        };

        const AdvancedAnalyticsEmployee = ({ employeeStats, logs }) => {
            const insights = useMemo(() => {
                if (employeeStats.length === 0) return [];

                const insights = [];

                const mostProjects = _.maxBy(employeeStats, 'taskCount');
                if (mostProjects) {
                    insights.push(
                        `最多才多藝: ${mostProjects.name} (參與 ${mostProjects.taskCount} 種工作)`
                    );
                }

                const longestHours = _.maxBy(employeeStats, 'hours');
                if (longestHours) {
                    insights.push(
                        `最勤奮的員工: ${longestHours.name} (${longestHours.hours.toFixed(2)} 小時)`
                    );
                }

                return insights;
            }, [employeeStats, logs]);

            return (
                <div>
                    <div className="chart-title">員工洞察</div>
                    {insights.map((insight, idx) => (
                        <div key={idx} className="insight-item">
                            {insight}
                        </div>
                    ))}
                </div>
            );
        };

        const AdvancedAnalyticsDepartment = ({ deptStats, logs }) => {
            const insights = useMemo(() => {
                if (deptStats.length === 0) return [];

                const insights = [];

                const largestDept = _.maxBy(deptStats, 'memberCount');
                if (largestDept) {
                    insights.push(
                        `人數最多的部門: ${largestDept.name} (${largestDept.memberCount} 人)`
                    );
                }

                const busiest = _.maxBy(deptStats, 'hours');
                if (busiest) {
                    insights.push(
                        `工時最長的部門: ${busiest.name} (${busiest.hours.toFixed(2)} 小時)`
                    );
                }

                const mostEfficient = deptStats.length > 0
                    ? _.minBy(deptStats.filter(d => d.hours > 0), d => d.hours / d.memberCount)
                    : null;
                if (mostEfficient) {
                    insights.push(
                        `人均工時最高的部門: ${mostEfficient.name}`
                    );
                }

                return insights;
            }, [deptStats, logs]);

            return (
                <div>
                    <div className="chart-title">部門洞察</div>
                    {insights.map((insight, idx) => (
                        <div key={idx} className="insight-item">
                            {insight}
                        </div>
                    ))}
                </div>
            );
        };

        // Render App
        ReactDOM.createRoot(document.getElementById('root')).render(<FandoraDashboard />);
    </script>
    <script type="module">
        import * as RechartsModule from 'https://esm.sh/recharts@2.12.7?external=react,react-dom';
        window.Recharts = RechartsModule;
        const appScript = document.getElementById('app-script');
        if (appScript && window.Babel) {
            try {
                const code = window.Babel.transform(appScript.textContent, {
                    presets: ['react']
                }).code;
                const script = document.createElement('script');
                script.textContent = code;
                document.body.appendChild(script);
            } catch(e) {
                console.error('Babel transform error:', e);
                document.getElementById('root').innerHTML = '<div style="padding:40px;color:red;">載入錯誤: ' + e.message + '</div>';
            }
        }
    </script>
</body>
</html>
