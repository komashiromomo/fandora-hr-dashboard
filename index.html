                                                        <th>工作類型數</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {employeeStats.map((emp, idx) => (
                                                        <tr key={idx}>
                                                            <td>{emp.name}</td>
                                                            <td>{emp.dept}</td>
                                                            <td>{emp.hours.toFixed(2)}</td>
                                                            <td>{emp.taskCount}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {filteredLogs.length > 0 && (
                                    <div
                                        className="collapsible"
                                        onClick={(e) => e.currentTarget.classList.toggle('open')}
                                    >
                                        <div className="collapsible-header">
                                            進階分析
                                            <span className="collapsible-toggle">▼</span>
                                        </div>
                                        <div className="collapsible-content">
                                            <AdvancedAnalyticsEmployee
                                                employeeStats={employeeStats}
                                                logs={filteredLogs}
                                                monthlyEmployeeTrend={monthlyEmployeeTrend}
                                            />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Departments Tab */}
                        {activeTab === 'departments' && (
                            <div>
                                <div className="toolbar">
                                    <div className="toolbar-group">
                                        <label className="toolbar-label">部門：</label>
                                        <select
                                            value={selectedDept}
                                            onChange={(e) => setSelectedDept(e.target.value)}
                                        >
                                            <option value="all">全部</option>
                                            {allDepts.map(dept => (
                                                <option key={dept} value={dept}>{dept}</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>

                                {deptStats.length > 0 && (
                                    <div>
                                        <div className="chart-container">
                                            <div className="chart-title">部門工時分佈</div>
                                            <ResponsiveContainer width="100%" height={300}>
                                                <BarChart data={deptStats}>
                                                    <CartesianGrid strokeDasharray="3 3" />
                                                    <XAxis dataKey="name" />
                                                    <YAxis />
                                                    <Tooltip />
                                                    <Bar dataKey="hours" fill="#00BCD4" />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>

                                        {selectedDept !== 'all' && selectedDeptData.length > 0 && (
                                            <div className="responsive-grid">
                                                {selectedDeptData[0].memberCount > 0 && (
                                                    <div className="chart-container">
                                                        <div className="chart-title">成員工時分佈</div>
                                                        <ResponsiveContainer width="100%" height={300}>
                                                            <BarChart
                                                                data={selectedDeptData[0].members.map(member => ({
                                                                    name: member,
                                                                    hours: _.sumBy(
                                                                        filteredLogs.filter(l =>
                                                                            l.dept === selectedDept && l.name === member
                                                                        ),
                                                                        'hours'
                                                                    )
                                                                }))}
                                                            >
                                                                <CartesianGrid strokeDasharray="3 3" />
                                                                <XAxis dataKey="name" />
                                                                <YAxis />
                                                                <Tooltip />
                                                                <Bar dataKey="hours" fill="#FF6B6B" />
                                                            </BarChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                )}

                                                {selectedDeptData[0].taskCount > 0 && (
                                                    <div className="chart-container">
                                                        <div className="chart-title">工作分類分佈</div>
                                                        <ResponsiveContainer width="100%" height={300}>
                                                            <PieChart>
                                                                <Pie
                                                                    data={_.take(
                                                                        selectedDeptData[0].tasks.map(task => ({
                                                                            name: task,
                                                                            hours: _.sumBy(
                                                                                filteredLogs.filter(l =>
                                                                                    l.dept === selectedDept && l.task === task
                                                                                ),
                                                                                'hours'
                                                                            )
                                                                        }))
                                                                            .sort((a, b) => b.hours - a.hours),
                                                                        10
                                                                    )}
                                                                    dataKey="hours"
                                                                    nameKey="name"
                                                                    outerRadius={80}
                                                                    label
                                                                >
                                                                    {_.take(selectedDeptData[0].tasks, 10).map((_, index) => (
                                                                        <Cell key={index} fill={COLORS[index % COLORS.length]} />
                                                                    ))}
                                                                </Pie>
                                                                <Tooltip />
                                                            </PieChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <div className="table-container">
                                            <div className="chart-title">部門統計</div>
                                            <table>
                                                <thead>
                                                    <tr>
                                                        <th>部門</th>
                                                        <th>總工時</th>
                                                        <th>成員數</th>
                                                        <th>平均工時</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {deptStats.map((d, idx) => (
                                                        <tr key={idx}>
                                                            <td>{d.name}</td>
                                                            <td>{d.hours.toFixed(2)}</td>
                                                            <td>{d.memberCount}</td>
                                                            <td>{d.avgPerMember}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {filteredLogs.length > 0 && (
                                    <div
                                        className="collapsible"
                                        onClick={(e) => e.currentTarget.classList.toggle('open')}
                                    >
                                        <div className="collapsible-header">
                                            進階分析
                                            <span className="collapsible-toggle">▼</span>
                                        </div>
                                        <div className="collapsible-content">
                                            <AdvancedAnalyticsDepartment
                                                deptStats={deptStats}
                                                logs={filteredLogs}
                                                monthlyDeptTrend={monthlyDeptTrend}
                                            />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Settings Tab */}
                        {activeTab === 'settings' && (
                            <div className="chart-container">
                                <div className="chart-title">Google Drive 設定</div>
                                <div className="settings-form">
                                    <div className="form-group">
                                        <label>Google Drive API Key</label>
                                        <input
                                            type="password"
                                            value={apiKey}
                                            onChange={(e) => setApiKey(e.target.value)}
                                            placeholder="輸入您的 API Key"
                                        />
                                        <div className="help-text">
                                            <a href="https://console.cloud.google.com/" target="_blank" rel="noopener noreferrer">
                                                從 Google Cloud Console 獲取 API Key
                                            </a>
                                        </div>
                                    </div>

                                    <div className="form-group">
                                        <label>工時日誌資料夾 ID</label>
                                        <input
                                            type="text"
                                            value={folderId}
                                            onChange={(e) => setFolderId(e.target.value)}
                                            placeholder="輸入資料夾 ID"
                                        />
                                        <div className="help-text">
                                            資料夾 ID 可從 Google Drive 的分享連結中取得
                                        </div>
                                    </div>

                                    <div className="form-group">
                                        <label>薪資資料夾 ID (可選)</label>
                                        <input
                                            type="text"
                                            value={salaryFolderId}
                                            onChange={(e) => setSalaryFolderId(e.target.value)}
                                            placeholder="輸入資料夾 ID，或留空以使用同一資料夾"
                                        />
                                        <div className="help-text">
                                            如果薪資檔案與工時日誌在同一資料夾，可以留空
                                        </div>
                                    </div>

                                    <div className="toolbar">
                                        <button
                                            className="btn btn-primary"
                                            onClick={handleSaveSettings}
                                        >
                                            保存設定
                                        </button>
                                        <button
                                            className="btn btn-secondary"
                                            onClick={handleTestConnection}
                                            disabled={testingConnection}
                                        >
                                            {testingConnection ? '測試中...' : '測試連線'}
                                        </button>
                                        <button
                                            className="btn btn-primary"
                                            onClick={loadDataFromGDrive}
                                            disabled={!apiKey || !folderId || loading}
                                        >
                                            {loading ? '載入中...' : '現在載入數據'}
                                        </button>
                                    </div>
                                </div>

                                <div className="chart-title" style={{ marginTop: '40px' }}>
                                    手動上傳
                                </div>

                                <div className="form-group">
                                    <label>上傳工時日誌 (Excel)</label>
                                    <DragDropUpload onFiles={handleWorkLogUpload} accept=".xlsx" />
                                    {workLogs.length > 0 && (
                                        <div className="file-list">
                                            <div className="file-item">
                                                已加載 {workLogs.length} 條工作記錄
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="form-group">
                                    <label>上傳薪資資料 (Excel)</label>
                                    <DragDropUpload onFiles={handleSalaryUpload} accept=".xlsx" />
                                    {salaryData.length > 0 && (
                                        <div className="file-list">
                                            <div className="file-item">
                                                已加載 {salaryData.length} 條薪資記錄
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="toolbar">
                                    <button
                                        className="btn btn-danger"
                                        onClick={() => {
                                            if (window.confirm('確定要清除所有數據嗎?')) {
                                                setWorkLogs([]);
                                                setSalaryData([]);
                                                setMessage({ type: 'success', text: '數據已清除' });
                                            }
                                        }}
                                    >
                                        清除所有數據
                                    </button>
                                </div>
                            </div>
                        )}

                        {filteredLogs.length === 0 && activeTab !== 'settings' && (
                            <div className="empty-state">
                                <h3>暫無數據</h3>
                                <p>請先在「設定」頁籤配置 Google Drive 或上傳 Excel 檔案</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Drag & Drop Upload Component
        const DragDropUpload = ({ onFiles, accept }) => {
            const [dragover, setDragover] = useState(false);

            const handleDragover = (e) => {
                e.preventDefault();
                setDragover(true);
            };

            const handleDragleave = () => {
                setDragover(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragover(false);
                const files = e.dataTransfer.files;
                if (files) onFiles(files);
            };

            const handleInputChange = (e) => {
                if (e.target.files) onFiles(e.target.files);
            };

            return (
                <div
                    className={`upload-area ${dragover ? 'dragover' : ''}`}
                    onDragover={handleDragover}
                    onDragleave={handleDragleave}
                    onDrop={handleDrop}
                    onClick={() => document.getElementById(`file-input-${accept}`).click()}
                >
                    <div style={{ fontSize: '24px', marginBottom: '8px' }}>📁</div>
                    <div style={{ fontWeight: '600' }}>拖放 Excel 檔案或點擊選擇</div>
                    <div style={{ fontSize: '12px', color: '#999', marginTop: '4px' }}>
                        支援格式: {accept}
                    </div>
                    <input
                        id={`file-input-${accept}`}
                        type="file"
                        multiple
                        accept={accept}
                        onChange={handleInputChange}
                        style={{ display: 'none' }}
                    />
                </div>
            );
        };

        // Advanced Analytics Components
        const AdvancedAnalyticsOverview = ({ logs, salary, projectStats, employeeStats, monthlyProjectTrend }) => {
            const insights = useMemo(() => {
                const insights = [];

                // Highest workload project
                if (projectStats.length > 0) {
                    insights.push(
                        `最忙碌的專案: ${projectStats[0].name} (${projectStats[0].hours.toFixed(2)} 小時)`
                    );
                }

                // Most versatile employee
                const mostVersatile = _.maxBy(employeeStats, 'taskCount');
                if (mostVersatile) {
                    insights.push(
                        `最多才多藝的員工: ${mostVersatile.name} (${mostVersatile.taskCount} 種工作)`
                    );
                }

                // Hardest working employee
                const hardestWorking = _.maxBy(employeeStats, 'hours');
                if (hardestWorking) {
                    insights.push(
                        `工時最長的員工: ${hardestWorking.name} (${hardestWorking.hours.toFixed(2)} 小時)`
                    );
                }

                return insights;
            }, [projectStats, employeeStats]);

            return (
                <div>
                    <div className="chart-title">關鍵洞察</div>
                    {insights.map((insight, idx) => (
                        <div key={idx} className="insight-item">
                            {insight}
                        </div>
                    ))}
                    {monthlyProjectTrend && monthlyProjectTrend.length > 1 && (
                        <div style={{marginTop: '20px'}}>
                            <div className="chart-title">Top 5 授權IP 逐月趨勢</div>
                            <ResponsiveContainer width="100%" height={300}>
                                <LineChart data={monthlyProjectTrend}>
                                    <CartesianGrid strokeDasharray="3 3" />
                                    <XAxis dataKey="month" />
                                    <YAxis />
                                    <Tooltip />
                                    <Legend />
                                    {Object.keys(monthlyProjectTrend[0] || {}).filter(k => k !== 'month').map((key, idx) => (
                                        <Line key={key} type="monotone" dataKey={key} stroke={COLORS[idx % COLORS.length]} />
                                    ))}
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    )}
                </div>
            );
        };

        const AdvancedAnalyticsProject = ({ projectStats, logs, monthlyProjectTrend }) => {
            const insights = useMemo(() => {
                if (projectStats.length === 0) return [];

                const insights = [];
                const highestCost = _.maxBy(projectStats, p => {
                    return _.sumBy(logs.filter(l => (l.ipProject || '非授權IP') === p.name), 'hours');
                });

                if (highestCost) {
                    insights.push(`最高成本的專案: ${highestCost.name}`);
                }

                const mostTeamMembers = _.maxBy(projectStats, 'employeeCount');
                if (mostTeamMembers) {
                    insights.push(`參與人數最多的專案: ${mostTeamMembers.name} (${mostTeamMembers.employeeCount} 人)`);
                }

                return insights;
            }, [projectStats, logs]);

            return (
                <div>
                    <div className="chart-title">專案洞察</div>
                    {insights.map((insight, idx) => (
                        <div key={idx} className="insight-item">
                            {insight}
                        </div>
                    ))}
                    {monthlyProjectTrend && monthlyProjectTrend.length > 1 && (
                        <div style={{marginTop: '20px'}}>
                            <div className="chart-title">Top 5 授權IP 逐月趨勢</div>
                            <ResponsiveContainer width="100%" height={300}>
                                <LineChart data={monthlyProjectTrend}>
                                    <CartesianGrid strokeDasharray="3 3" />
                                    <XAxis dataKey="month" />
                                    <YAxis />
                                    <Tooltip />
                                    <Legend />
                                    {Object.keys(monthlyProjectTrend[0] || {}).filter(k => k !== 'month').map((key, idx) => (
                                        <Line key={key} type="monotone" dataKey={key} stroke={COLORS[idx % COLORS.length]} />
                                    ))}
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    )}
                </div>
            );
        };

        const AdvancedAnalyticsEmployee = ({ employeeStats, logs, monthlyEmployeeTrend }) => {
            const insights = useMemo(() => {
                if (employeeStats.length === 0) return [];

                const insights = [];

                const mostProjects = _.maxBy(employeeStats, 'taskCount');
                if (mostProjects) {
                    insights.push(
                        `最多才多藝: ${mostProjects.name} (參與 ${mostProjects.taskCount} 種工作)`
                    );
                }

                const longestHours = _.maxBy(employeeStats, 'hours');
                if (longestHours) {
                    insights.push(
                        `最勤奮的員工: ${longestHours.name} (${longestHours.hours.toFixed(2)} 小時)`
                    );
                }

                return insights;
            }, [employeeStats, logs]);

            return (
                <div>
                    <div className="chart-title">員工洞察</div>
                    {insights.map((insight, idx) => (
                        <div key={idx} className="insight-item">
                            {insight}
                        </div>
                    ))}
                    {monthlyEmployeeTrend && monthlyEmployeeTrend.length > 1 && (
                        <div style={{marginTop: '20px'}}>
                            <div className="chart-title">Top 5 員工 逐月趨勢</div>
                            <ResponsiveContainer width="100%" height={300}>
                                <LineChart data={monthlyEmployeeTrend}>
                                    <CartesianGrid strokeDasharray="3 3" />
                                    <XAxis dataKey="month" />
                                    <YAxis />
                                    <Tooltip />
                                    <Legend />
                                    {Object.keys(monthlyEmployeeTrend[0] || {}).filter(k => k !== 'month').map((key, idx) => (
                                        <Line key={key} type="monotone" dataKey={key} stroke={COLORS[idx % COLORS.length]} />
                                    ))}
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    )}
                </div>
            );
        };

        const AdvancedAnalyticsDepartment = ({ deptStats, logs, monthlyDeptTrend }) => {
            const insights = useMemo(() => {
                if (deptStats.length === 0) return [];

                const insights = [];

                const largestDept = _.maxBy(deptStats, 'memberCount');
                if (largestDept) {
                    insights.push(
                        `人數最多的部門: ${largestDept.name} (${largestDept.memberCount} 人)`
                    );
                }

                const busiest = _.maxBy(deptStats, 'hours');
                if (busiest) {
                    insights.push(
                        `工時最長的部門: ${busiest.name} (${busiest.hours.toFixed(2)} 小時)`
                    );
                }

                const mostEfficient = deptStats.length > 0
                    ? _.minBy(deptStats.filter(d => d.hours > 0), d => d.hours / d.memberCount)
                    : null;
                if (mostEfficient) {
                    insights.push(
                        `人均工時最高的部門: ${mostEfficient.name}`
                    );
                }

                return insights;
            }, [deptStats, logs]);

            return (
                <div>
                    <div className="chart-title">部門洞察</div>
                    {insights.map((insight, idx) => (
                        <div key={idx} className="insight-item">
                            {insight}
                        </div>
                    ))}
                    {monthlyDeptTrend && monthlyDeptTrend.length > 1 && (
                        <div style={{marginTop: '20px'}}>
                            <div className="chart-title">各部門逐月趨勢</div>
                            <ResponsiveContainer width="100%" height={300}>
                                <LineChart data={monthlyDeptTrend}>
                                    <CartesianGrid strokeDasharray="3 3" />
                                    <XAxis dataKey="month" />
                                    <YAxis />
                                    <Tooltip />
                                    <Legend />
                                    {Object.keys(monthlyDeptTrend[0] || {}).filter(k => k !== 'month').map((key, idx) => (
                                        <Line key={key} type="monotone" dataKey={key} stroke={COLORS[idx % COLORS.length]} />
                                    ))}
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    )}
                </div>
            );
        };

        const AdvancedAnalyticsWorkType = ({ workTypeStats, logs }) => {
            const insights = useMemo(() => {
                if (workTypeStats.length === 0) return [];
                const insights = [];
                insights.push(`最耗時的工作項目: ${workTypeStats[0].name} (${workTypeStats[0].hours.toFixed(2)} 小時)`);
                const mostCross = _.maxBy(workTypeStats, 'employeeCount');
                if (mostCross) insights.push(`最多人參與的工作項目: ${mostCross.name} (${mostCross.employeeCount} 人)`);
                const mostIP = _.maxBy(workTypeStats, 'ipCount');
                if (mostIP && mostIP.ipCount > 0) insights.push(`橫跨最多授權IP的工作項目: ${mostIP.name} (${mostIP.ipCount} 個IP)`);
                return insights;
            }, [workTypeStats, logs]);
            return (
                <div>
                    <div className="chart-title">工作項目洞察</div>
                    {insights.map((insight, idx) => (
                        <div key={idx} className="insight-item">{insight}</div>
                    ))}
                </div>
            );
        };

        // Render App
        ReactDOM.createRoot(document.getElementById('root')).render(<FandoraDashboard />);
    </script>
    <script type="module">
        import * as RechartsModule from 'https://esm.sh/recharts@2.12.7?external=react,react-dom';
        window.Recharts = RechartsModule;
        const appScript = document.getElementById('app-script');
        if (appScript && window.Babel) {
            try {
                const code = window.Babel.transform(appScript.textContent, {
                    presets: ['react']
                }).code;
                const script = document.createElement('script');
                script.textContent = code;
                document.body.appendChild(script);
            } catch(e) {
                console.error('Babel transform error:', e);
                document.getElementById('root').innerHTML = '<div style="padding:40px;color:red;">載入錯誤: ' + e.message + '</div>';
            }
        }
    </script>
</body>
</html>
